<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <defs>
    <marker id="arrJ" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 8 5, 0 10" fill="#f59e0b"/>
    </marker>
    <marker id="arrM" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 8 5, 0 10" fill="#7fcfa0"/>
    </marker>
    <marker id="arrA" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 8 5, 0 10" fill="#7fc7f5"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="540" fill="#1a1a1d"/>

  <!-- Title -->
  <text x="460" y="35" text-anchor="middle" fill="#fde68a" font-size="18" font-weight="500">How the packet actually gets there</text>
  <text x="460" y="56" text-anchor="middle" fill="#9a9888" font-size="13" font-style="italic">each gateway has its own routing table — and they pass the packet along</text>

  <!-- ===== LAPTOP ===== -->
  <rect x="40" y="225" width="120" height="90" rx="8" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2"/>
  <rect x="55" y="240" width="90" height="55" rx="3" fill="#0d2240" stroke="#5a8fcc" stroke-width="1"/>
  <rect x="35" y="315" width="130" height="6" rx="2" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="1"/>
  <text x="100" y="345" text-anchor="middle" fill="#dbe9f7" font-size="12" font-weight="500">Your laptop</text>
  <text x="100" y="362" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">192.168.1.5</text>

  <!-- ===== HOME ROUTER ===== -->
  <rect x="210" y="225" width="110" height="90" rx="8" fill="#3c2f0a" stroke="#f59e0b" stroke-width="2"/>
  <text x="265" y="252" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="600">Home router</text>
  <!-- Mini routing table pictogram -->
  <rect x="225" y="265" width="80" height="36" rx="3" fill="#1a1a23" stroke="#a89df5" stroke-width="1"/>
  <text x="265" y="277" text-anchor="middle" fill="#cec5f5" font-size="8" font-weight="600">R.T.</text>
  <line x1="232" y1="282" x2="298" y2="282" stroke="#7c70d4" stroke-width="0.5"/>
  <line x1="232" y1="289" x2="298" y2="289" stroke="#7c70d4" stroke-width="0.5"/>
  <line x1="232" y1="296" x2="298" y2="296" stroke="#7c70d4" stroke-width="0.5"/>
  <text x="265" y="345" text-anchor="middle" fill="#fde68a" font-size="10" font-family="ui-monospace, monospace">192.168.1.1</text>
  <text x="265" y="362" text-anchor="middle" fill="#9a9888" font-size="9" font-style="italic">your house</text>

  <!-- arrow laptop -> home router -->
  <line x1="165" y1="270" x2="205" y2="270" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrJ)"/>

  <!-- ===== ISP GATEWAY ===== -->
  <rect x="370" y="225" width="110" height="90" rx="8" fill="#3c2f0a" stroke="#f59e0b" stroke-width="2"/>
  <text x="425" y="252" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="600">ISP gateway</text>
  <rect x="385" y="265" width="80" height="36" rx="3" fill="#1a1a23" stroke="#a89df5" stroke-width="1"/>
  <text x="425" y="277" text-anchor="middle" fill="#cec5f5" font-size="8" font-weight="600">R.T.</text>
  <line x1="392" y1="282" x2="458" y2="282" stroke="#7c70d4" stroke-width="0.5"/>
  <line x1="392" y1="289" x2="458" y2="289" stroke="#7c70d4" stroke-width="0.5"/>
  <line x1="392" y1="296" x2="458" y2="296" stroke="#7c70d4" stroke-width="0.5"/>
  <text x="425" y="345" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic">e.g. Turk Telekom</text>
  <text x="425" y="362" text-anchor="middle" fill="#9a9888" font-size="9" font-style="italic">your city</text>

  <!-- arrow home router -> ISP -->
  <line x1="325" y1="270" x2="365" y2="270" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrJ)"/>

  <!-- ===== BACKBONE ===== -->
  <rect x="530" y="225" width="110" height="90" rx="8" fill="#3c2f0a" stroke="#f59e0b" stroke-width="2"/>
  <text x="585" y="252" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="600">Backbone</text>
  <text x="585" y="266" text-anchor="middle" fill="#fde68a" font-size="11">router</text>
  <rect x="545" y="275" width="80" height="30" rx="3" fill="#1a1a23" stroke="#a89df5" stroke-width="1"/>
  <text x="585" y="287" text-anchor="middle" fill="#cec5f5" font-size="8" font-weight="600">R.T.</text>
  <line x1="552" y1="292" x2="618" y2="292" stroke="#7c70d4" stroke-width="0.5"/>
  <line x1="552" y1="299" x2="618" y2="299" stroke="#7c70d4" stroke-width="0.5"/>
  <text x="585" y="345" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic">the internet's spine</text>
  <text x="585" y="362" text-anchor="middle" fill="#9a9888" font-size="9" font-style="italic">undersea cables, fiber</text>

  <!-- arrow ISP -> backbone -->
  <line x1="485" y1="270" x2="525" y2="270" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrJ)"/>

  <!-- ===== SPLIT POINT — backbone forks to two destinations ===== -->

  <!-- ===== MINECRAFT BRANCH (top right) ===== -->
  <rect x="700" y="100" width="110" height="80" rx="8" fill="#3c2f0a" stroke="#f59e0b" stroke-width="2"/>
  <text x="755" y="124" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="600">Edge router</text>
  <rect x="715" y="135" width="80" height="30" rx="3" fill="#1a1a23" stroke="#a89df5" stroke-width="1"/>
  <text x="755" y="146" text-anchor="middle" fill="#cec5f5" font-size="8" font-weight="600">R.T.</text>
  <line x1="722" y1="151" x2="788" y2="151" stroke="#7c70d4" stroke-width="0.5"/>
  <line x1="722" y1="158" x2="788" y2="158" stroke="#7c70d4" stroke-width="0.5"/>

  <!-- Minecraft server building -->
  <rect x="830" y="80" width="60" height="120" rx="4" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="2"/>
  <polygon points="826,80 860,55 894,80" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="2"/>
  <rect x="843" y="95" width="14" height="20" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>
  <rect x="862" y="95" width="14" height="20" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>
  <rect x="843" y="120" width="14" height="20" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>
  <rect x="862" y="120" width="14" height="20" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>
  <rect x="843" y="145" width="33" height="50" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>
  <text x="860" y="220" text-anchor="middle" fill="#c4f0d4" font-size="11" font-weight="500">Minecraft server</text>
  <text x="860" y="236" text-anchor="middle" fill="#fde68a" font-size="10" font-family="ui-monospace, monospace">52.84.150.39</text>

  <!-- arrows: backbone -> edge -> minecraft -->
  <line x1="643" y1="245" x2="700" y2="160" stroke="#7fcfa0" stroke-width="2" marker-end="url(#arrM)"/>
  <line x1="815" y1="140" x2="835" y2="140" stroke="#7fcfa0" stroke-width="2" marker-end="url(#arrM)"/>

  <!-- ===== AZURE BRANCH (bottom right) ===== -->
  <rect x="700" y="380" width="110" height="80" rx="8" fill="#3c2f0a" stroke="#f59e0b" stroke-width="2"/>
  <text x="755" y="404" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="600">Azure gateway</text>
  <rect x="715" y="415" width="80" height="30" rx="3" fill="#1a1a23" stroke="#a89df5" stroke-width="1"/>
  <text x="755" y="426" text-anchor="middle" fill="#cec5f5" font-size="8" font-weight="600">R.T.</text>
  <line x1="722" y1="431" x2="788" y2="431" stroke="#7c70d4" stroke-width="0.5"/>
  <line x1="722" y1="438" x2="788" y2="438" stroke="#7c70d4" stroke-width="0.5"/>

  <!-- Azure VM building -->
  <rect x="830" y="360" width="60" height="120" rx="4" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2"/>
  <polygon points="826,360 860,335 894,360" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2"/>
  <rect x="843" y="375" width="14" height="20" fill="#0d2240" stroke="#5a8fcc" stroke-width="0.5"/>
  <rect x="862" y="375" width="14" height="20" fill="#0d2240" stroke="#5a8fcc" stroke-width="0.5"/>
  <rect x="843" y="400" width="14" height="20" fill="#0d2240" stroke="#5a8fcc" stroke-width="0.5"/>
  <rect x="862" y="400" width="14" height="20" fill="#0d2240" stroke="#5a8fcc" stroke-width="0.5"/>
  <rect x="843" y="425" width="33" height="50" fill="#0d2240" stroke="#5a8fcc" stroke-width="0.5"/>
  <text x="860" y="500" text-anchor="middle" fill="#dbe9f7" font-size="11" font-weight="500">Azure VM</text>
  <text x="860" y="516" text-anchor="middle" fill="#fde68a" font-size="10" font-family="ui-monospace, monospace">52.114.128.10</text>

  <!-- arrows: backbone -> azure gateway -> azure VM -->
  <line x1="643" y1="295" x2="700" y2="395" stroke="#7fc7f5" stroke-width="2" marker-end="url(#arrA)"/>
  <line x1="815" y1="420" x2="835" y2="420" stroke="#7fc7f5" stroke-width="2" marker-end="url(#arrA)"/>

  <!-- ===== Hop labels between gateways ===== -->
  <text x="185" y="260" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic">hop</text>
  <text x="345" y="260" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic">hop</text>
  <text x="505" y="260" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic">hop</text>

  <!-- ===== Bottom takeaway box ===== -->
  <rect x="40" y="475" width="640" height="50" rx="8" fill="#2a2520" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="60" y="497" fill="#fde68a" font-size="13" font-weight="500">Each gateway has its own routing table.</text>
  <text x="60" y="515" fill="#c2c0b6" font-size="12" font-style="italic">Every box looks up the destination, forwards to the next hop. That's how the internet works — one hop at a time.</text>

</svg>
