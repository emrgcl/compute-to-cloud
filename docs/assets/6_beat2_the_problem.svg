        <g transform="translate(0,130)"><rect x="0" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="26" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="52" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="78" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="104" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="130" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="156" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="182" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="208" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="234" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="260" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="286" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/></g>
        <g transform="translate(0,156)"><rect x="0" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="26" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="52" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="78" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="104" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="130" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="156" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="182" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="208" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="234" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="260" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="286" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/></g>
        <g transform="translate(0,182)"><rect x="0" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="26" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="52" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="78" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="104" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="130" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="156" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="182" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="208" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="234" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="260" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="286" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/></g>
      </g>

      <!-- Highlight just 4 squares (top-left) — what one app actually uses -->
      <rect x="0" y="0" width="22" height="22" rx="2" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
      <rect x="26" y="0" width="22" height="22" rx="2" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
      <rect x="52" y="0" width="22" height="22" rx="2" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
      <rect x="78" y="0" width="22" height="22" rx="2" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
    </g>

    <text x="180" y="290" text-anchor="middle" fill="#c4f0d4" font-size="13" font-weight="500">96 cores · 1 TB RAM</text>
    <text x="180" y="310" text-anchor="middle" fill="#fde68a" font-size="11" font-style="italic">4 cores used (highlighted)</text>
    <text x="180" y="328" text-anchor="middle" fill="#fda4a4" font-size="11">~96% wasted</text>
  </g>

  <!-- ===== RIGHT: The question ===== -->
  <g transform="translate(500, 120)">
    <text x="0" y="0" fill="#7fc7f5" font-size="13" font-weight="600" letter-spacing="0.5">YOUR WEB APP NEEDS</text>
    <text x="0" y="35" fill="#dbe9f7" font-size="16">4 cores</text>
    <text x="0" y="56" fill="#dbe9f7" font-size="16">8 GB RAM</text>
    <text x="0" y="77" fill="#dbe9f7" font-size="16">50 GB disk</text>

    <line x1="0" y1="100" x2="380" y2="100" stroke="#3a3a3e" stroke-width="0.5"/>

    <text x="0" y="125" fill="#9a9888" font-size="11" letter-spacing="0.5">SO ONE SERVER PER APP IS WASTEFUL</text>
    <text x="0" y="150" fill="#f3f1ea" font-size="13">If buying a whole server for every app...</text>
    <text x="0" y="172" fill="#fda4a4" font-size="13">→ 92 cores idle</text>
    <text x="0" y="192" fill="#fda4a4" font-size="13">→ 992 GB RAM idle</text>
    <text x="0" y="212" fill="#fda4a4" font-size="13">→ thousands of $ wasted per server</text>

    <text x="0" y="252" fill="#fde68a" font-size="14" font-weight="500" font-style="italic">How do many small apps share one big server?</text>
    <text x="0" y="278" fill="#9a9888" font-size="12" font-style="italic">— without seeing each other?</text>
    <text x="0" y="296" fill="#9a9888" font-size="12" font-style="italic">— and each one thinking it owns the place?</text>
  </g>

  <!-- Bottom takeaway -->
  <rect x="60" y="445" width="800" height="40" rx="10" fill="#2a2520" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="80" y="471" fill="#fde68a" font-size="14" font-style="italic">
    That question is what virtualization was invented to answer.
  </text>
</svg>
