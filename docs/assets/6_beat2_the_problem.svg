        <g transform="translate(0,78)"><rect x="0" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="26" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="52" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="78" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="104" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="130" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="156" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="182" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="208" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="234" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="260" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/><rect x="286" y="0" width="22" height="22" rx="2" fill="#1a4d2e" stroke="#4ba377" stroke-width="0.5"/></g>
