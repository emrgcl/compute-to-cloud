<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <defs>
    <marker id="arrLad" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 8 5, 0 10" fill="#9a9888"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="540" fill="#1a1a1d"/>

  <text x="460" y="32" text-anchor="middle" fill="#fde68a" font-size="18" font-weight="500">Now imagine this — at hyperscale</text>
  <text x="460" y="54" text-anchor="middle" fill="#9a9888" font-size="13" font-style="italic">the scale ladder from Layer 4 — but now we know what's inside</text>

  <!-- Scale ladder boxes -->
  <g transform="translate(40, 95)">
    <!-- box 1: ONE -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="120" height="140" rx="10" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="1.5"/>
      <text x="60" y="24" text-anchor="middle" fill="#7fcfa0" font-size="10" font-weight="600" letter-spacing="1">ONE</text>
      <rect x="35" y="55" width="50" height="12" rx="2" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="0.8"/>
      <circle cx="42" cy="61" r="1.5" fill="#5dca8a"/>
      <text x="60" y="98" text-anchor="middle" fill="#c4f0d4" font-size="12" font-weight="500">1 server</text>
      <text x="60" y="118" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic">Layer 4</text>
    </g>
    <line x1="125" y1="70" x2="143" y2="70" stroke="#9a9888" stroke-width="1.5" marker-end="url(#arrLad)"/>

    <!-- box 2: RACK -->
    <g transform="translate(148, 0)">
      <rect x="0" y="0" width="120" height="140" rx="10" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="1.5"/>
      <text x="60" y="24" text-anchor="middle" fill="#7fcfa0" font-size="10" font-weight="600" letter-spacing="1">RACK</text>
      <g transform="translate(40, 45)">
        <rect x="0" y="0" width="40" height="6" rx="1" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="0.5"/>
        <rect x="0" y="8" width="40" height="6" rx="1" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="0.5"/>
        <rect x="0" y="16" width="40" height="6" rx="1" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="0.5"/>
        <rect x="0" y="24" width="40" height="6" rx="1" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="0.5"/>
      </g>
      <text x="60" y="98" text-anchor="middle" fill="#c4f0d4" font-size="12" font-weight="500">~50 servers</text>
      <text x="60" y="118" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic">a cabinet</text>
    </g>
    <line x1="273" y1="70" x2="291" y2="70" stroke="#9a9888" stroke-width="1.5" marker-end="url(#arrLad)"/>

    <!-- box 3: ROW -->
    <g transform="translate(296, 0)">
      <rect x="0" y="0" width="120" height="140" rx="10" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
      <text x="60" y="24" text-anchor="middle" fill="#7fcfa0" font-size="10" font-weight="600" letter-spacing="1">ROW</text>
      <g transform="translate(15, 45)">
        <rect x="0" y="0" width="14" height="38" rx="1" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="0.5"/>
        <rect x="18" y="0" width="14" height="38" rx="1" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="0.5"/>
        <rect x="36" y="0" width="14" height="38" rx="1" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="0.5"/>
        <rect x="54" y="0" width="14" height="38" rx="1" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="0.5"/>
        <rect x="72" y="0" width="14" height="38" rx="1" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="0.5"/>
      </g>
      <text x="60" y="98" text-anchor="middle" fill="#c4f0d4" font-size="12" font-weight="500">~100s racks</text>
      <text x="60" y="118" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic">a row</text>
    </g>
    <line x1="421" y1="70" x2="439" y2="70" stroke="#9a9888" stroke-width="1.5" marker-end="url(#arrLad)"/>

    <!-- box 4: DATACENTER -->
    <g transform="translate(444, 0)">
      <rect x="0" y="0" width="120" height="140" rx="10" fill="#2d1b69" stroke="#a89df5" stroke-width="1.5"/>
      <text x="60" y="24" text-anchor="middle" fill="#a89df5" font-size="10" font-weight="600" letter-spacing="1">DATACENTER</text>
      <g transform="translate(20, 42)">
        <rect x="0" y="15" width="80" height="32" rx="1" fill="#1a103e" stroke="#a89df5" stroke-width="1"/>
        <polygon points="-4,15 40,-2 84,15" fill="#1a103e" stroke="#a89df5" stroke-width="1"/>
        <rect x="10" y="22" width="6" height="8" fill="#a89df5" opacity="0.4"/>
        <rect x="22" y="22" width="6" height="8" fill="#a89df5" opacity="0.4"/>
        <rect x="34" y="22" width="6" height="8" fill="#a89df5" opacity="0.4"/>
        <rect x="46" y="22" width="6" height="8" fill="#a89df5" opacity="0.4"/>
        <rect x="58" y="22" width="6" height="8" fill="#a89df5" opacity="0.4"/>
        <rect x="70" y="22" width="6" height="8" fill="#a89df5" opacity="0.4"/>
      </g>
      <text x="60" y="105" text-anchor="middle" fill="#dcd5f5" font-size="11" font-weight="500">tens of</text>
      <text x="60" y="120" text-anchor="middle" fill="#dcd5f5" font-size="11" font-weight="500">thousands</text>
    </g>
    <line x1="569" y1="70" x2="587" y2="70" stroke="#9a9888" stroke-width="1.5" marker-end="url(#arrLad)"/>

    <!-- box 5: AZURE -->
    <g transform="translate(592, 0)">
      <rect x="0" y="0" width="240" height="140" rx="10" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2.5"/>
      <text x="120" y="24" text-anchor="middle" fill="#7fc7f5" font-size="11" font-weight="700" letter-spacing="1">AZURE</text>

      <!-- globe -->
      <g transform="translate(85, 45)">
        <circle cx="20" cy="20" r="22" fill="none" stroke="#7fc7f5" stroke-width="1.5"/>
        <ellipse cx="20" cy="20" rx="22" ry="9" fill="none" stroke="#7fc7f5" stroke-width="0.5"/>
        <ellipse cx="20" cy="20" rx="10" ry="22" fill="none" stroke="#7fc7f5" stroke-width="0.5"/>
        <line x1="-2" y1="20" x2="42" y2="20" stroke="#7fc7f5" stroke-width="0.5"/>
      </g>
      <text x="120" y="108" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="700">~400 datacenters</text>
      <text x="120" y="125" text-anchor="middle" fill="#dbe9f7" font-size="11" font-style="italic">70+ countries — including Amsterdam</text>
    </g>
  </g>

  <!-- Bottom: "you're already using it" panel -->
  <rect x="40" y="270" width="840" height="240" rx="12" fill="#2a2520" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="60" y="300" fill="#fde68a" font-size="14" font-weight="700" letter-spacing="0.5">YOU'RE ALREADY USING IT</text>

  <text x="60" y="330" fill="#c2c0b6" font-size="13" font-style="italic">
    Three things you almost certainly use — all of them run on Azure:
  </text>

  <!-- Three example cards inline -->
  <g transform="translate(60, 350)">
    <!-- ChatGPT -->
    <rect x="0" y="0" width="260" height="80" rx="8" fill="#0d2240" stroke="#7fc7f5" stroke-width="1.5"/>
    <text x="15" y="22" fill="#fde68a" font-size="13" font-weight="700">🤖 ChatGPT</text>
    <text x="15" y="44" fill="#dbe9f7" font-size="12">every prompt, every answer</text>
    <text x="15" y="64" fill="#9a9888" font-size="11" font-style="italic">OpenAI runs on Microsoft Azure</text>

    <!-- Minecraft -->
    <rect x="280" y="0" width="260" height="80" rx="8" fill="#0d2240" stroke="#7fc7f5" stroke-width="1.5"/>
    <text x="295" y="22" fill="#fde68a" font-size="13" font-weight="700">⛏️ Minecraft Realms</text>
    <text x="295" y="44" fill="#dbe9f7" font-size="12">the multiplayer servers</text>
    <text x="295" y="64" fill="#9a9888" font-size="11" font-style="italic">our example from L3 and L4</text>

    <!-- Xbox -->
    <rect x="560" y="0" width="260" height="80" rx="8" fill="#0d2240" stroke="#7fc7f5" stroke-width="1.5"/>
    <text x="575" y="22" fill="#fde68a" font-size="13" font-weight="700">🎮 Xbox Live</text>
    <text x="575" y="44" fill="#dbe9f7" font-size="12">every online match</text>
    <text x="575" y="64" fill="#9a9888" font-size="11" font-style="italic">all sessions, leaderboards, profiles</text>
  </g>

  <text x="60" y="465" fill="#f3f1ea" font-size="13">
    Plus most of <tspan fill="#fde68a">Microsoft 365</tspan> — Teams, Outlook, OneDrive — and a huge share of enterprise apps.
  </text>
  <text x="60" y="492" fill="#c2c0b6" font-size="13" font-style="italic">
    <tspan fill="#fde68a">You've been a cloud user this whole time.</tspan> You just didn't know what was underneath. <tspan fill="#fde68a">Now you do.</tspan>
  </text>
</svg>
