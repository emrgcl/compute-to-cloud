<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <defs>
    <marker id="arrBlock" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 8 5, 0 10" fill="#ef4444"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="540" fill="#1a1a1d"/>

  <text x="460" y="32" text-anchor="middle" fill="#fde68a" font-size="18" font-weight="500">The isolation guarantee</text>
  <text x="460" y="54" text-anchor="middle" fill="#9a9888" font-size="13" font-style="italic">VMs cannot see each other — same kernel trick from Layer 2, one level up</text>

  <!-- ===== TOP: 3 VMs that can't see each other ===== -->
  <g transform="translate(60, 90)">
    <!-- VM A: bank app -->
    <rect x="0" y="0" width="240" height="160" rx="8" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="2"/>
    <text x="120" y="25" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="700">VM A</text>
    <text x="120" y="48" text-anchor="middle" fill="#c4f0d4" font-size="12">🏦 your bank's app</text>
    <text x="120" y="78" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">customer data</text>
    <text x="120" y="98" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">transactions</text>
    <text x="120" y="118" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">account balances</text>
    <text x="120" y="148" text-anchor="middle" fill="#fde68a" font-size="11">"only I exist"</text>

    <!-- VM B: competitor -->
    <rect x="300" y="0" width="240" height="160" rx="8" fill="#0d2240" stroke="#7fc7f5" stroke-width="2"/>
    <text x="420" y="25" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="700">VM B</text>
    <text x="420" y="48" text-anchor="middle" fill="#dbe9f7" font-size="12">🏪 their competitor</text>
    <text x="420" y="78" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">customer data</text>
    <text x="420" y="98" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">transactions</text>
    <text x="420" y="118" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">account balances</text>
    <text x="420" y="148" text-anchor="middle" fill="#fde68a" font-size="11">"only I exist"</text>

    <!-- VM C: someone else -->
    <rect x="600" y="0" width="240" height="160" rx="8" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="2"/>
    <text x="720" y="25" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="700">VM C</text>
    <text x="720" y="48" text-anchor="middle" fill="#c4f0d4" font-size="12">🎮 someone's game server</text>
    <text x="720" y="78" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">player accounts</text>
    <text x="720" y="98" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">game state</text>
    <text x="720" y="118" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">private messages</text>
    <text x="720" y="148" text-anchor="middle" fill="#fde68a" font-size="11">"only I exist"</text>

    <!-- Blocked arrows between VMs -->
    <line x1="245" y1="80" x2="297" y2="80" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="272" y="73" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="700">✗</text>

    <line x1="545" y1="80" x2="597" y2="80" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="572" y="73" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="700">✗</text>
  </g>

  <text x="460" y="278" text-anchor="middle" fill="#fda4a4" font-size="13" font-style="italic">VM A cannot read VM B's memory. VM B cannot see VM C's disks. None of them know the others exist.</text>

  <!-- ===== MIDDLE: Hypervisor + CPU enforce isolation ===== -->
  <g transform="translate(60, 295)">
    <rect x="0" y="0" width="800" height="70" rx="8" fill="#2d1b69" stroke="#fde68a" stroke-width="2"/>
    <text x="400" y="25" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="600" letter-spacing="0.5">HYPERVISOR + CPU — TOGETHER ENFORCE THE WALLS</text>
    <text x="400" y="48" text-anchor="middle" fill="#cec5f5" font-size="11" font-style="italic">VMs have their own memory pages, their own virtual disks, their own everything</text>
    <text x="400" y="64" text-anchor="middle" fill="#cec5f5" font-size="11" font-style="italic">— the hardware itself refuses to let one VM touch another's memory</text>
  </g>

  <!-- ===== BOTTOM: Layer 2 callback -->
  <rect x="40" y="395" width="840" height="135" rx="10" fill="#2a2520" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="60" y="420" fill="#fde68a" font-size="13" font-weight="600" letter-spacing="0.5">REMEMBER LAYER 2?</text>

  <text x="60" y="448" fill="#f3f1ea" font-size="13">
    <tspan fill="#fde68a">"The kernel keeps programs isolated. The CPU enforces it. No program can touch another's memory."</tspan>
  </text>
  <text x="60" y="473" fill="#c2c0b6" font-size="13">
    Layer 6 is <em>the same trick, one level up</em>. The hypervisor keeps <em>VMs</em> isolated. The CPU enforces it.
  </text>
  <text x="60" y="497" fill="#c2c0b6" font-size="13" font-style="italic">
    No new idea. <tspan fill="#fde68a">Same boundary-enforcement mechanism — applied to bigger boxes.</tspan>
  </text>
  <text x="60" y="519" fill="#9a9888" font-size="12" font-style="italic">
    This is why Microsoft is comfortable putting your bank's VM on the same physical server as their competitor's VM.
  </text>
</svg>
