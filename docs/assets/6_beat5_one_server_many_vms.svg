<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect x="0" y="0" width="920" height="540" fill="#1a1a1d"/>

  <text x="460" y="32" text-anchor="middle" fill="#fde68a" font-size="18" font-weight="500">One physical server — six virtual machines</text>
  <text x="460" y="54" text-anchor="middle" fill="#9a9888" font-size="13" font-style="italic">same hardware. different OSes. different workloads. all running side by side.</text>

  <!-- ===== TOP: VMs stacked horizontally ===== -->
  <g transform="translate(40, 90)">
    <!-- VM 1 -->
    <rect x="0" y="0" width="135" height="180" rx="6" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <text x="67" y="22" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">VM 1</text>
    <rect x="10" y="32" width="115" height="22" rx="2" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>
    <text x="67" y="48" text-anchor="middle" fill="#c4f0d4" font-size="10">🐧 Ubuntu Linux</text>
    <text x="67" y="78" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">4 vCPU</text>
    <text x="67" y="96" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">8 GB RAM</text>
    <text x="67" y="114" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">50 GB disk</text>
    <text x="67" y="148" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic">web server</text>
    <circle cx="67" cy="165" r="3" fill="#5dca8a"/>

    <!-- VM 2 -->
    <rect x="145" y="0" width="135" height="180" rx="6" fill="#0d2240" stroke="#7fc7f5" stroke-width="1.5"/>
    <text x="212" y="22" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">VM 2</text>
    <rect x="155" y="32" width="115" height="22" rx="2" fill="#0d2240" stroke="#5a8fcc" stroke-width="0.5"/>
    <text x="212" y="48" text-anchor="middle" fill="#dbe9f7" font-size="10">🪟 Windows Server</text>
    <text x="212" y="78" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">8 vCPU</text>
    <text x="212" y="96" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">32 GB RAM</text>
    <text x="212" y="114" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">200 GB disk</text>
    <text x="212" y="148" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic">enterprise app</text>
    <circle cx="212" cy="165" r="3" fill="#5dca8a"/>

    <!-- VM 3 -->
    <rect x="290" y="0" width="135" height="180" rx="6" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <text x="357" y="22" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">VM 3</text>
    <rect x="300" y="32" width="115" height="22" rx="2" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>
    <text x="357" y="48" text-anchor="middle" fill="#c4f0d4" font-size="10">🐧 Red Hat Linux</text>
    <text x="357" y="78" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">16 vCPU</text>
    <text x="357" y="96" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">128 GB RAM</text>
    <text x="357" y="114" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">2 TB disk</text>
    <text x="357" y="148" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic">database</text>
    <circle cx="357" cy="165" r="3" fill="#5dca8a"/>

    <!-- VM 4 -->
    <rect x="435" y="0" width="135" height="180" rx="6" fill="#0d2240" stroke="#7fc7f5" stroke-width="1.5"/>
    <text x="502" y="22" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">VM 4</text>
    <rect x="445" y="32" width="115" height="22" rx="2" fill="#0d2240" stroke="#5a8fcc" stroke-width="0.5"/>
    <text x="502" y="48" text-anchor="middle" fill="#dbe9f7" font-size="10">🪟 Windows Server</text>
    <text x="502" y="78" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">2 vCPU</text>
    <text x="502" y="96" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">4 GB RAM</text>
    <text x="502" y="114" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">100 GB disk</text>
    <text x="502" y="148" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic">file share</text>
    <circle cx="502" cy="165" r="3" fill="#5dca8a"/>

    <!-- VM 5 -->
    <rect x="580" y="0" width="135" height="180" rx="6" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <text x="647" y="22" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">VM 5</text>
    <rect x="590" y="32" width="115" height="22" rx="2" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>
    <text x="647" y="48" text-anchor="middle" fill="#c4f0d4" font-size="10">🐧 Alpine Linux</text>
    <text x="647" y="78" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">2 vCPU</text>
    <text x="647" y="96" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">2 GB RAM</text>
    <text x="647" y="114" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">20 GB disk</text>
    <text x="647" y="148" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic">cache</text>
    <circle cx="647" cy="165" r="3" fill="#5dca8a"/>

    <!-- VM 6 -->
    <rect x="725" y="0" width="115" height="180" rx="6" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <text x="782" y="22" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">VM 6</text>
    <rect x="735" y="32" width="95" height="22" rx="2" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>
    <text x="782" y="48" text-anchor="middle" fill="#c4f0d4" font-size="10">🐧 Debian</text>
    <text x="782" y="78" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">64 vCPU</text>
    <text x="782" y="96" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">512 GB</text>
    <text x="782" y="114" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">1 TB disk</text>
    <text x="782" y="148" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic">data crunching</text>
    <circle cx="782" cy="165" r="3" fill="#5dca8a"/>
  </g>

  <!-- ===== MIDDLE: Hypervisor band ===== -->
  <g transform="translate(40, 295)">
    <rect x="0" y="0" width="840" height="50" rx="6" fill="#2d1b69" stroke="#fde68a" stroke-width="2"/>
    <text x="420" y="25" text-anchor="middle" fill="#fde68a" font-size="14" font-weight="700" letter-spacing="0.5">HYPERVISOR</text>
    <text x="420" y="42" text-anchor="middle" fill="#cec5f5" font-size="11" font-style="italic">slices the real hardware, shows each VM only its share</text>
  </g>

  <!-- ===== BOTTOM: Physical hardware ===== -->
  <g transform="translate(40, 360)">
    <rect x="0" y="0" width="840" height="90" rx="6" fill="#0d2240" stroke="#7fc7f5" stroke-width="2"/>
    <text x="20" y="22" fill="#7fc7f5" font-size="12" font-weight="600" letter-spacing="0.5">PHYSICAL HARDWARE — ONE SERVER</text>
    <text x="20" y="48" fill="#dbe9f7" font-size="13" font-family="ui-monospace, monospace">96 cores · 1 TB RAM · 8 disks · 4 NICs</text>
    <text x="20" y="70" fill="#9a9888" font-size="11" font-style="italic">VMs total ask: 96 vCPU + 686 GB RAM — fits comfortably</text>
    <text x="700" y="48" fill="#fde68a" font-size="11" letter-spacing="0.5">USAGE</text>
    <text x="700" y="68" fill="#5dca8a" font-size="13" font-weight="500">~70% utilized</text>
  </g>

  <!-- Bottom takeaway -->
  <rect x="40" y="470" width="840" height="50" rx="10" fill="#2a2520" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="60" y="490" fill="#fde68a" font-size="13" font-weight="600" letter-spacing="0.5">SAME HARDWARE — MANY MACHINES ON IT</text>
  <text x="60" y="510" fill="#c2c0b6" font-size="13" font-style="italic">
    Hypervisors used today: <tspan fill="#fde68a">Hyper-V</tspan> (Microsoft) · <tspan fill="#fde68a">VMware ESXi</tspan> · <tspan fill="#fde68a">KVM</tspan> (Linux). Same idea — different vendors.
  </text>
</svg>
