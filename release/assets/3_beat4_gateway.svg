<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <defs>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 8 5, 0 10" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="500" fill="#1a1a1d"/>

  <text x="440" y="35" text-anchor="middle" fill="#9a9888" font-size="14" letter-spacing="1">TO REACH OUTSIDE — GO THROUGH THE GATEWAY</text>

  <!-- Left subnet -->
  <rect x="40" y="80" width="340" height="320" rx="20" fill="none" stroke="#7fcfa0" stroke-width="2" stroke-dasharray="8 5" opacity="0.8"/>
  <text x="60" y="105" fill="#7fcfa0" font-size="12" font-weight="500">SUBNET — your home</text>
  <text x="60" y="121" fill="#5a9c75" font-size="10" font-family="ui-monospace, monospace">192.168.1.0/24</text>

  <!-- Building A in left subnet (laptop) -->
  <rect x="80" y="180" width="100" height="130" rx="6" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2"/>
  <polygon points="75,180 130,140 185,180" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2"/>
  <rect x="95" y="210" width="18" height="25" fill="#0d2240" stroke="#5a8fcc" stroke-width="1"/>
  <rect x="120" y="210" width="18" height="25" fill="#0d2240" stroke="#5a8fcc" stroke-width="1"/>
  <rect x="145" y="210" width="18" height="25" fill="#0d2240" stroke="#5a8fcc" stroke-width="1"/>
  <rect x="95" y="245" width="32" height="50" fill="#0d2240" stroke="#5a8fcc" stroke-width="1"/>
  <rect x="140" y="245" width="32" height="50" fill="#0d2240" stroke="#5a8fcc" stroke-width="1"/>
  <text x="130" y="328" text-anchor="middle" fill="#dbe9f7" font-size="11">Your laptop</text>
  <text x="130" y="345" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">192.168.1.5</text>
  <text x="130" y="362" text-anchor="middle" fill="#9a9888" font-size="10" font-family="ui-monospace, monospace">255.255.255.0</text>

  <!-- Building B in left subnet (phone) -->
  <rect x="230" y="180" width="100" height="130" rx="6" fill="#2d1b69" stroke="#a89df5" stroke-width="2"/>
  <polygon points="225,180 280,140 335,180" fill="#2d1b69" stroke="#a89df5" stroke-width="2"/>
  <rect x="245" y="210" width="18" height="25" fill="#1a103e" stroke="#7c70d4" stroke-width="1"/>
  <rect x="270" y="210" width="18" height="25" fill="#1a103e" stroke="#7c70d4" stroke-width="1"/>
  <rect x="295" y="210" width="18" height="25" fill="#1a103e" stroke="#7c70d4" stroke-width="1"/>
  <rect x="245" y="245" width="32" height="50" fill="#1a103e" stroke="#7c70d4" stroke-width="1"/>
  <rect x="290" y="245" width="32" height="50" fill="#1a103e" stroke="#7c70d4" stroke-width="1"/>
  <text x="280" y="328" text-anchor="middle" fill="#dcd5f5" font-size="11">Your phone</text>
  <text x="280" y="345" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">192.168.1.8</text>
  <text x="280" y="362" text-anchor="middle" fill="#9a9888" font-size="10" font-family="ui-monospace, monospace">255.255.255.0</text>

  <!-- Gateway in middle -->
  <rect x="395" y="200" width="90" height="90" rx="10" fill="#3c2f0a" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="440" y="232" text-anchor="middle" fill="#fde68a" font-size="14" font-weight="600">Gateway</text>
  <text x="440" y="252" text-anchor="middle" fill="#f59e0b" font-size="11" font-style="italic">the door</text>
  <text x="440" y="272" text-anchor="middle" fill="#9a9888" font-size="11" font-family="ui-monospace, monospace">192.168.1.1</text>

  <!-- Routing table sitting above the gateway -->
  <rect x="345" y="55" width="190" height="130" rx="6" fill="#1a1a23" stroke="#a89df5" stroke-width="1.5"/>
  <text x="440" y="73" text-anchor="middle" fill="#cec5f5" font-size="11" font-weight="600" letter-spacing="0.5">ROUTING TABLE</text>
  <line x1="355" y1="80" x2="525" y2="80" stroke="#3a3a3e" stroke-width="0.5"/>

  <!-- Column headers -->
  <text x="355" y="95" fill="#7a7872" font-size="9" letter-spacing="0.3">DESTINATION</text>
  <text x="455" y="95" fill="#7a7872" font-size="9" letter-spacing="0.3">NEXT HOP</text>

  <!-- Route 1: local subnet -->
  <text x="355" y="115" fill="#f3f1ea" font-size="10" font-family="ui-monospace, monospace">192.168.1.0/24</text>
  <text x="455" y="115" fill="#7fcfa0" font-size="10" font-style="italic">local</text>

  <!-- Route 2: specific remote subnet -->
  <text x="355" y="135" fill="#f3f1ea" font-size="10" font-family="ui-monospace, monospace">10.0.0.0/24</text>
  <text x="455" y="135" fill="#fde68a" font-size="10" font-family="ui-monospace, monospace">→ ISP</text>

  <!-- Route 3: default -->
  <text x="355" y="155" fill="#f3f1ea" font-size="10" font-family="ui-monospace, monospace">0.0.0.0/0</text>
  <text x="455" y="155" fill="#fde68a" font-size="10" font-family="ui-monospace, monospace">→ ISP</text>
  <text x="355" y="172" fill="#9a9888" font-size="9" font-style="italic">(default — everything else)</text>

  <!-- Connector line from table to gateway -->
  <line x1="440" y1="185" x2="440" y2="200" stroke="#a89df5" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Right subnet -->
  <rect x="500" y="80" width="340" height="320" rx="20" fill="none" stroke="#7fcfa0" stroke-width="2" stroke-dasharray="8 5" opacity="0.8"/>
  <text x="520" y="105" fill="#7fcfa0" font-size="12" font-weight="500">SUBNET — Azure datacenter</text>
  <text x="520" y="121" fill="#5a9c75" font-size="10" font-family="ui-monospace, monospace">10.0.0.0/24</text>

  <!-- Azure VM 1 -->
  <rect x="540" y="180" width="100" height="130" rx="6" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="2"/>
  <polygon points="535,180 590,140 645,180" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="2"/>
  <rect x="555" y="210" width="18" height="25" fill="#0d2e1a" stroke="#4ba377" stroke-width="1"/>
  <rect x="580" y="210" width="18" height="25" fill="#0d2e1a" stroke="#4ba377" stroke-width="1"/>
  <rect x="605" y="210" width="18" height="25" fill="#0d2e1a" stroke="#4ba377" stroke-width="1"/>
  <rect x="555" y="245" width="32" height="50" fill="#0d2e1a" stroke="#4ba377" stroke-width="1"/>
  <rect x="600" y="245" width="32" height="50" fill="#0d2e1a" stroke="#4ba377" stroke-width="1"/>
  <text x="590" y="328" text-anchor="middle" fill="#c4f0d4" font-size="11">Web server</text>
  <text x="590" y="345" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">10.0.0.4</text>
  <text x="590" y="362" text-anchor="middle" fill="#9a9888" font-size="10" font-family="ui-monospace, monospace">255.255.255.0</text>

  <!-- Azure VM 2 -->
  <rect x="690" y="180" width="100" height="130" rx="6" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="2"/>
  <polygon points="685,180 740,140 795,180" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="2"/>
  <rect x="705" y="210" width="18" height="25" fill="#0d2e1a" stroke="#4ba377" stroke-width="1"/>
  <rect x="730" y="210" width="18" height="25" fill="#0d2e1a" stroke="#4ba377" stroke-width="1"/>
  <rect x="755" y="210" width="18" height="25" fill="#0d2e1a" stroke="#4ba377" stroke-width="1"/>
  <rect x="705" y="245" width="32" height="50" fill="#0d2e1a" stroke="#4ba377" stroke-width="1"/>
  <rect x="750" y="245" width="32" height="50" fill="#0d2e1a" stroke="#4ba377" stroke-width="1"/>
  <text x="740" y="328" text-anchor="middle" fill="#c4f0d4" font-size="11">Database</text>
  <text x="740" y="345" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">10.0.0.5</text>
  <text x="740" y="362" text-anchor="middle" fill="#9a9888" font-size="10" font-family="ui-monospace, monospace">255.255.255.0</text>

  <!-- Arrow from laptop through gateway to Azure subnet -->
  <line x1="180" y1="245" x2="390" y2="245" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="285" y="235" text-anchor="middle" fill="#f59e0b" font-size="11" font-style="italic">going outside? route through gateway</text>

  <line x1="488" y1="245" x2="535" y2="245" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Caption -->
  <text x="440" y="435" text-anchor="middle" fill="#f3f1ea" font-size="14">Same subnet? Talk direct. <tspan fill="#f59e0b" font-weight="500">Different subnet — route through the gateway.</tspan></text>
  <text x="440" y="463" text-anchor="middle" fill="#9a9888" font-size="13" font-style="italic">Your home router is a gateway. Your school has one. Every cloud network has one. Same job.</text>
</svg>
