<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <defs>
    <marker id="arrP" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 8 5, 0 10" fill="#a89df5"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="500" fill="#1a1a1d"/>

  <text x="440" y="35" text-anchor="middle" fill="#9a9888" font-size="14" letter-spacing="1">ONE COMPUTER, MANY SERVICES — PORTS</text>

  <!-- Left side: small reminder of the laptop sending requests -->
  <rect x="40" y="200" width="100" height="100" rx="6" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2" opacity="0.7"/>
  <text x="90" y="245" text-anchor="middle" fill="#dbe9f7" font-size="12">Your laptop</text>
  <text x="90" y="265" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">192.168.1.5</text>

  <!-- Three differently-targeted requests going out -->
  <line x1="145" y1="225" x2="295" y2="170" stroke="#a89df5" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="220" y="160" fill="#a89df5" font-size="11" font-family="ui-monospace, monospace">:443</text>

  <line x1="145" y1="250" x2="295" y2="250" stroke="#a89df5" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="220" y="240" fill="#a89df5" font-size="11" font-family="ui-monospace, monospace">:22</text>

  <line x1="145" y1="275" x2="295" y2="330" stroke="#a89df5" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="220" y="330" fill="#a89df5" font-size="11" font-family="ui-monospace, monospace">:3389</text>

  <!-- Building - a server with multiple ports as mailbox slots -->
  <rect x="300" y="105" width="280" height="280" rx="6" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="2"/>
  <polygon points="295,105 440,55 585,105" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="2"/>

  <text x="440" y="92" text-anchor="middle" fill="#c4f0d4" font-size="13" font-weight="500">A single server</text>

  <!-- Mailbox slots as ports -->
  <!-- Slot 1: web -->
  <rect x="325" y="130" width="230" height="40" rx="4" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="1.5"/>
  <rect x="332" y="138" width="22" height="24" fill="#3c2f0a" stroke="#f59e0b" stroke-width="1"/>
  <text x="367" y="155" fill="#fde68a" font-size="14" font-family="ui-monospace, monospace" font-weight="600">:443</text>
  <text x="430" y="155" fill="#c4f0d4" font-size="13">secure web (HTTPS)</text>

  <!-- Slot 2: http -->
  <rect x="325" y="180" width="230" height="40" rx="4" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="1.5"/>
  <rect x="332" y="188" width="22" height="24" fill="#3c2f0a" stroke="#f59e0b" stroke-width="1"/>
  <text x="367" y="205" fill="#fde68a" font-size="14" font-family="ui-monospace, monospace" font-weight="600">:80</text>
  <text x="425" y="205" fill="#c4f0d4" font-size="13">web (HTTP)</text>

  <!-- Slot 3: ssh -->
  <rect x="325" y="230" width="230" height="40" rx="4" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="1.5"/>
  <rect x="332" y="238" width="22" height="24" fill="#3c2f0a" stroke="#f59e0b" stroke-width="1"/>
  <text x="367" y="255" fill="#fde68a" font-size="14" font-family="ui-monospace, monospace" font-weight="600">:22</text>
  <text x="430" y="255" fill="#c4f0d4" font-size="13">SSH (Linux remote)</text>

  <!-- Slot 4: rdp -->
  <rect x="325" y="280" width="230" height="40" rx="4" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="1.5"/>
  <rect x="332" y="288" width="22" height="24" fill="#3c2f0a" stroke="#f59e0b" stroke-width="1"/>
  <text x="367" y="305" fill="#fde68a" font-size="14" font-family="ui-monospace, monospace" font-weight="600">:3389</text>
  <text x="445" y="305" fill="#c4f0d4" font-size="13">RDP (Windows remote)</text>

  <!-- Slot 5: dns (dimmed for "and many more") -->
  <rect x="325" y="330" width="230" height="40" rx="4" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="1.5" opacity="0.6"/>
  <rect x="332" y="338" width="22" height="24" fill="#3c2f0a" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="367" y="355" fill="#9a9888" font-size="14" font-family="ui-monospace, monospace" opacity="0.7">:53</text>
  <text x="440" y="355" fill="#9a9888" font-size="13" opacity="0.7" font-style="italic">DNS, and many more…</text>

  <!-- Sidebar on right explaining IP+port concept -->
  <rect x="610" y="160" width="240" height="190" rx="8" fill="#23232a" stroke="#3a3a3e" stroke-width="1"/>
  <text x="630" y="185" fill="#fde68a" font-size="12" font-weight="500" letter-spacing="0.5">REACHING A SERVICE</text>

  <text x="630" y="218" fill="#f3f1ea" font-size="13" font-family="ui-monospace, monospace">10.0.0.4:443</text>
  <text x="630" y="236" fill="#9a9888" font-size="11" font-style="italic">IP + port</text>

  <text x="630" y="265" fill="#c4f0d4" font-size="12">→ "this server,</text>
  <text x="650" y="282" fill="#c4f0d4" font-size="12">the secure-web slot"</text>

  <line x1="625" y1="295" x2="835" y2="295" stroke="#3a3a3e" stroke-width="1"/>

  <text x="630" y="318" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">443 = always web</text>
  <text x="630" y="335" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">22 = always SSH</text>

  <!-- Caption -->
  <text x="440" y="435" text-anchor="middle" fill="#f3f1ea" font-size="14">An <tspan fill="#fde68a" font-family="ui-monospace, monospace">IP address</tspan> finds the building. A <tspan fill="#a89df5" font-family="ui-monospace, monospace">port number</tspan> picks the right slot inside.</text>
</svg>
