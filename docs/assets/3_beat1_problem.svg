<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrQ" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 8 5, 0 10" fill="#7a7872"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="500" fill="#1a1a1d"/>

  <!-- Laptop on left -->
  <rect x="80" y="200" width="160" height="100" rx="10" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2"/>
  <rect x="92" y="212" width="136" height="70" rx="4" fill="#0d2240" stroke="#5a8fcc" stroke-width="1"/>
  <rect x="70" y="300" width="180" height="8" rx="2" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="1"/>
  <text x="160" y="335" text-anchor="middle" fill="#dbe9f7" font-size="15" font-weight="500">Your laptop</text>
  <text x="160" y="355" text-anchor="middle" fill="#a5c3e0" font-size="12" font-style="italic">somewhere in Turkey</text>

  <!-- Internet cloud in middle -->
  <ellipse cx="440" cy="250" rx="140" ry="75" fill="#2a2520" stroke="#7a7872" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="440" y="245" text-anchor="middle" fill="#9a9888" font-size="20" font-weight="500">the internet</text>
  <text x="440" y="270" text-anchor="middle" fill="#7a7872" font-size="13" font-style="italic">~5 billion connected devices</text>

  <!-- Arrow from laptop into cloud -->
  <line x1="245" y1="250" x2="305" y2="250" stroke="#7a7872" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrQ)"/>
  <text x="275" y="240" text-anchor="middle" fill="#9a9888" font-size="14" font-weight="500">?</text>

  <!-- Mystery server on right -->
  <rect x="660" y="190" width="140" height="120" rx="8" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="2"/>
  <rect x="675" y="205" width="110" height="14" rx="2" fill="#0d2e1a"/>
  <rect x="675" y="225" width="110" height="14" rx="2" fill="#0d2e1a"/>
  <rect x="675" y="245" width="110" height="14" rx="2" fill="#0d2e1a"/>
  <rect x="675" y="265" width="110" height="14" rx="2" fill="#0d2e1a"/>
  <rect x="675" y="285" width="110" height="14" rx="2" fill="#0d2e1a"/>
  <text x="730" y="335" text-anchor="middle" fill="#c4f0d4" font-size="15" font-weight="500">A specific server</text>
  <text x="730" y="355" text-anchor="middle" fill="#a0d8b6" font-size="12" font-style="italic">probably another country</text>

  <!-- Arrow from cloud to server -->
  <line x1="575" y1="250" x2="650" y2="250" stroke="#7a7872" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrQ)"/>
  <text x="613" y="240" text-anchor="middle" fill="#9a9888" font-size="14" font-weight="500">?</text>

  <!-- Big question at bottom -->
  <text x="440" y="430" text-anchor="middle" fill="#fde68a" font-size="22" font-weight="500" font-style="italic">How does your laptop find that specific server?</text>
  <text x="440" y="460" text-anchor="middle" fill="#9a9888" font-size="15" font-style="italic">Out of billions.</text>
</svg>
