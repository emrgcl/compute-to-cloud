<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect x="0" y="0" width="920" height="500" fill="#1a1a1d"/>

  <!-- Title on top center -->
  <text x="460" y="35" text-anchor="middle" fill="#fde68a" font-size="18" font-weight="500">The math under the mask</text>
  <text x="460" y="56" text-anchor="middle" fill="#9a9888" font-size="13" font-style="italic">how the gateway actually decides local or remote</text>

  <!-- Truth table top-right corner -->
  <rect x="720" y="80" width="160" height="100" rx="6" fill="#1a1a23" stroke="#a89df5" stroke-width="1.5"/>
  <text x="800" y="100" text-anchor="middle" fill="#cec5f5" font-size="11" font-weight="600" letter-spacing="0.5">BITWISE AND</text>
  <line x1="730" y1="107" x2="870" y2="107" stroke="#3a3a3e" stroke-width="0.5"/>
  <text x="800" y="127" text-anchor="middle" fill="#f3f1ea" font-size="13" font-family="ui-monospace, monospace">1 AND 1 = 1</text>
  <text x="800" y="146" text-anchor="middle" fill="#f3f1ea" font-size="13" font-family="ui-monospace, monospace">1 AND 0 = 0</text>
  <text x="800" y="165" text-anchor="middle" fill="#f3f1ea" font-size="13" font-family="ui-monospace, monospace">0 AND 0 = 0</text>

  <!-- ==================== LEFT: dotted decimal ==================== -->

  <!-- IP decimal -->
  <text x="60" y="115" fill="#7a7872" font-size="11" letter-spacing="0.5">IP</text>
  <text x="60" y="145" fill="#fde68a" font-size="20" font-family="ui-monospace, monospace" font-weight="500">192.168.1.5</text>

  <!-- Mask decimal -->
  <text x="60" y="200" fill="#7a7872" font-size="11" letter-spacing="0.5">MASK</text>
  <text x="60" y="230" fill="#7fcfa0" font-size="20" font-family="ui-monospace, monospace" font-weight="500">255.255.255.0</text>

  <!-- Visual divider before the AND result -->
  <line x1="60" y1="260" x2="290" y2="260" stroke="#3a3a3e" stroke-width="1"/>
  <text x="270" y="255" text-anchor="end" fill="#a89df5" font-size="12" font-weight="500">AND</text>

  <!-- Network address decimal (the result) -->
  <text x="60" y="295" fill="#7a7872" font-size="11" letter-spacing="0.5">NETWORK ADDRESS</text>
  <text x="60" y="328" fill="#fda4a4" font-size="22" font-family="ui-monospace, monospace" font-weight="600">192.168.1.0</text>

  <!-- ==================== RIGHT: binary octet-grouped ==================== -->

  <!-- IP binary -->
  <text x="320" y="115" fill="#7a7872" font-size="11" letter-spacing="0.5">IP (binary)</text>
  <text x="320" y="145" fill="#fde68a" font-size="15" font-family="ui-monospace, monospace" letter-spacing="0.5">11000000 . 10101000 . 00000001 . 00000101</text>

  <!-- Mask binary -->
  <text x="320" y="200" fill="#7a7872" font-size="11" letter-spacing="0.5">MASK (binary)</text>
  <text x="320" y="230" fill="#7fcfa0" font-size="15" font-family="ui-monospace, monospace" letter-spacing="0.5">11111111 . 11111111 . 11111111 . 00000000</text>

  <!-- Divider -->
  <line x1="320" y1="260" x2="880" y2="260" stroke="#3a3a3e" stroke-width="1"/>
  <text x="870" y="255" text-anchor="end" fill="#a89df5" font-size="12" font-weight="500">AND</text>

  <!-- AND result binary -->
  <!-- First bit highlighted with a background, rest dim -->
  <rect x="316" y="276" width="14" height="22" rx="2" fill="rgba(245, 158, 11, 0.18)" stroke="#f59e0b" stroke-width="1"/>
  <text x="320" y="293" fill="#fde68a" font-size="15" font-family="ui-monospace, monospace" font-weight="700" letter-spacing="0.5">1</text>

  <!-- Rest of result dim -->
  <text x="333" y="293" fill="#6a6862" font-size="15" font-family="ui-monospace, monospace" letter-spacing="0.5">1000000 . 10101000 . 00000001 . 00000000</text>

  <!-- Annotation under first bit -->
  <line x1="323" y1="305" x2="323" y2="320" stroke="#f59e0b" stroke-width="1"/>
  <text x="195" y="335" fill="#fde68a" font-size="12" font-style="italic">first bit:</text>
  <text x="265" y="335" fill="#f3f1ea" font-size="13" font-family="ui-monospace, monospace">1 AND 1 = 1</text>

  <!-- Right side annotation explaining "rest of bits" -->
  <text x="700" y="335" fill="#6a6862" font-size="12" font-style="italic">…and so on for the other 31 bits</text>

  <!-- ==================== BOTTOM: takeaway box ==================== -->

  <rect x="60" y="370" width="820" height="105" rx="10" fill="#2a2520" stroke="#f59e0b" stroke-width="1.5"/>

  <text x="80" y="395" fill="#fde68a" font-size="13" font-weight="600" letter-spacing="0.5">RESULT</text>

  <text x="80" y="423" fill="#f3f1ea" font-size="15" font-family="ui-monospace, monospace">11000000 . 10101000 . 00000001 . 00000000</text>
  <text x="620" y="423" fill="#9a9888" font-size="15">=</text>
  <text x="650" y="423" fill="#fda4a4" font-size="17" font-family="ui-monospace, monospace" font-weight="600">192.168.1.0</text>

  <text x="80" y="455" fill="#c2c0b6" font-size="13" font-style="italic">
    The mask "covers" the first 24 bits — those are the network. The last 8 bits get erased.
  </text>
  <text x="80" y="473" fill="#9a9888" font-size="12" font-style="italic">
    24 ones in the mask → that's why we also write it as <tspan font-family="ui-monospace, monospace" fill="#fde68a">/24</tspan>. Just count the ones.
  </text>

</svg>
