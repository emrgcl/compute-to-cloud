<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect x="0" y="0" width="920" height="540" fill="#1a1a1d"/>

  <text x="460" y="60" text-anchor="middle" fill="#fde68a" font-size="22" font-weight="600">Live demo</text>
  <text x="460" y="90" text-anchor="middle" fill="#9a9888" font-size="14" font-style="italic">switching to the Azure portal — let's deploy a real VM, together</text>

  <!-- Three steps preview -->
  <g transform="translate(60, 140)">
    <!-- Step 1 -->
    <rect x="0" y="0" width="800" height="80" rx="10" fill="#0d2240" stroke="#7fc7f5" stroke-width="1.5"/>
    <circle cx="40" cy="40" r="20" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2"/>
    <text x="40" y="46" text-anchor="middle" fill="#dbe9f7" font-size="16" font-weight="700">1</text>
    <text x="80" y="36" fill="#fde68a" font-size="14" font-weight="600">Create a VM</text>
    <text x="80" y="58" fill="#dbe9f7" font-size="13">Click "Create resource" → pick OS → pick region → pick size → Review &amp; create</text>

    <!-- Step 2 -->
    <rect x="0" y="95" width="800" height="80" rx="10" fill="#0d2240" stroke="#7fc7f5" stroke-width="1.5"/>
    <circle cx="40" cy="135" r="20" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2"/>
    <text x="40" y="141" text-anchor="middle" fill="#dbe9f7" font-size="16" font-weight="700">2</text>
    <text x="80" y="131" fill="#fde68a" font-size="14" font-weight="600">Watch it appear</text>
    <text x="80" y="153" fill="#dbe9f7" font-size="13">~30 seconds — Azure carves out a VM on one of its physical servers, somewhere</text>

    <!-- Step 3 -->
    <rect x="0" y="190" width="800" height="80" rx="10" fill="#0d2240" stroke="#7fc7f5" stroke-width="1.5"/>
    <circle cx="40" cy="230" r="20" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2"/>
    <text x="40" y="236" text-anchor="middle" fill="#dbe9f7" font-size="16" font-weight="700">3</text>
    <text x="80" y="226" fill="#fde68a" font-size="14" font-weight="600">Connect &amp; delete</text>
    <text x="80" y="248" fill="#dbe9f7" font-size="13">Use SSH or RDP to log in — show it's a real machine — then delete it (stop paying)</text>
  </g>

  <!-- What to look for -->
  <rect x="60" y="445" width="800" height="65" rx="10" fill="#2a2520" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="80" y="470" fill="#fde68a" font-size="13" font-weight="600" letter-spacing="0.5">WHAT TO WATCH FOR</text>
  <text x="80" y="492" fill="#c2c0b6" font-size="12" font-style="italic">
    Every choice in the form maps to something from Layers 1-6. <tspan fill="#fde68a">Listen for the words you already know.</tspan>
  </text>
</svg>
