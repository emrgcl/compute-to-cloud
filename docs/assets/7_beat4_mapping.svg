<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect x="0" y="0" width="920" height="580" fill="#1a1a1d"/>

  <text x="460" y="32" text-anchor="middle" fill="#fde68a" font-size="18" font-weight="500">Every Azure concept — already taught</text>
  <text x="460" y="54" text-anchor="middle" fill="#9a9888" font-size="13" font-style="italic">there is no new idea in Azure that we haven't already covered</text>

  <!-- Column headers -->
  <rect x="40" y="80" width="840" height="36" rx="6" fill="#2a2520" stroke="#fde68a" stroke-width="1"/>
  <text x="80" y="103" fill="#fde68a" font-size="12" font-weight="700" letter-spacing="0.5">WHAT YOU LEARNED</text>
  <text x="400" y="103" fill="#fde68a" font-size="12" font-weight="700" letter-spacing="0.5">WHAT AZURE CALLS IT</text>
  <text x="720" y="103" fill="#fde68a" font-size="12" font-weight="700" letter-spacing="0.5">FROM</text>

  <!-- Row 1: Network -->
  <g transform="translate(40, 128)">
    <rect x="0" y="0" width="840" height="42" rx="4" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>
    <text x="40" y="26" fill="#c4f0d4" font-size="13">network · "neighborhood of computers"</text>
    <text x="360" y="26" fill="#fde68a" font-size="13" font-family="ui-monospace, monospace">Virtual Network (VNet)</text>
    <text x="680" y="26" fill="#9a9888" font-size="12" font-style="italic">Layer 3</text>
  </g>

  <!-- Row 2: Subnet -->
  <g transform="translate(40, 175)">
    <rect x="0" y="0" width="840" height="42" rx="4" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>
    <text x="40" y="26" fill="#c4f0d4" font-size="13">subnet · "address ranges inside a network"</text>
    <text x="360" y="26" fill="#fde68a" font-size="13" font-family="ui-monospace, monospace">Subnet</text>
    <text x="680" y="26" fill="#9a9888" font-size="12" font-style="italic">Layer 3</text>
  </g>

  <!-- Row 3: Firewall -->
  <g transform="translate(40, 222)">
    <rect x="0" y="0" width="840" height="42" rx="4" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>
    <text x="40" y="26" fill="#c4f0d4" font-size="13">firewall · "the doorman, port + IP rules"</text>
    <text x="360" y="26" fill="#fde68a" font-size="13" font-family="ui-monospace, monospace">Network Security Group (NSG)</text>
    <text x="680" y="26" fill="#9a9888" font-size="12" font-style="italic">Layer 3</text>
  </g>

  <!-- Row 4: IP -->
  <g transform="translate(40, 269)">
    <rect x="0" y="0" width="840" height="42" rx="4" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>
    <text x="40" y="26" fill="#c4f0d4" font-size="13">IP address · "the building's address"</text>
    <text x="360" y="26" fill="#fde68a" font-size="13" font-family="ui-monospace, monospace">Public IP / Private IP</text>
    <text x="680" y="26" fill="#9a9888" font-size="12" font-style="italic">Layer 3</text>
  </g>

  <!-- Row 5: Server -->
  <g transform="translate(40, 316)">
    <rect x="0" y="0" width="840" height="42" rx="4" fill="#1a1346" stroke="#534AB7" stroke-width="0.5"/>
    <text x="40" y="26" fill="#cec5f5" font-size="13">server · "the computer that serves you"</text>
    <text x="360" y="26" fill="#fde68a" font-size="13" font-family="ui-monospace, monospace">Virtual Machine (VM)</text>
    <text x="680" y="26" fill="#9a9888" font-size="12" font-style="italic">Layers 4 + 6</text>
  </g>

  <!-- Row 6: Server OS -->
  <g transform="translate(40, 363)">
    <rect x="0" y="0" width="840" height="42" rx="4" fill="#1a1346" stroke="#534AB7" stroke-width="0.5"/>
    <text x="40" y="26" fill="#cec5f5" font-size="13">server OS · "Linux or Windows Server"</text>
    <text x="360" y="26" fill="#fde68a" font-size="13" font-family="ui-monospace, monospace">VM Image (Ubuntu, Win Server, ...)</text>
    <text x="680" y="26" fill="#9a9888" font-size="12" font-style="italic">Layer 5</text>
  </g>

  <!-- Row 7: Datacenter -->
  <g transform="translate(40, 410)">
    <rect x="0" y="0" width="840" height="42" rx="4" fill="#0d2240" stroke="#185FA5" stroke-width="0.5"/>
    <text x="40" y="26" fill="#dbe9f7" font-size="13">datacenter · "the building of ~10,000s servers"</text>
    <text x="360" y="26" fill="#fde68a" font-size="13" font-family="ui-monospace, monospace">Region + Availability Zone</text>
    <text x="680" y="26" fill="#9a9888" font-size="12" font-style="italic">Layer 4</text>
  </g>

  <!-- Row 8: Hypervisor -->
  <g transform="translate(40, 457)">
    <rect x="0" y="0" width="840" height="42" rx="4" fill="#1a1346" stroke="#534AB7" stroke-width="0.5"/>
    <text x="40" y="26" fill="#cec5f5" font-size="13">hypervisor · "software pretending to be hardware"</text>
    <text x="360" y="26" fill="#fde68a" font-size="13" font-family="ui-monospace, monospace">Azure Hypervisor (a Hyper-V variant)</text>
    <text x="680" y="26" fill="#9a9888" font-size="12" font-style="italic">Layer 6</text>
  </g>

  <!-- Bottom takeaway -->
  <rect x="40" y="510" width="840" height="55" rx="10" fill="#2a2520" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="60" y="535" fill="#fde68a" font-size="13" font-weight="600" letter-spacing="0.5">NO NEW CONCEPTS — JUST NEW NAMES</text>
  <text x="60" y="555" fill="#c2c0b6" font-size="13" font-style="italic">
    Azure has hundreds of services. But the <tspan fill="#fde68a">foundation</tspan> — VMs, networks, regions, hypervisors — is everything we just spent 65 minutes on.
  </text>
</svg>
