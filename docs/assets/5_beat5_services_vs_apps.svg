<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect x="0" y="0" width="920" height="520" fill="#1a1a1d"/>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" fill="#fde68a" font-size="18" font-weight="500">Apps you launch · vs · services that run forever</text>
  <text x="460" y="54" text-anchor="middle" fill="#9a9888" font-size="13" font-style="italic">different model entirely for how programs live</text>

  <!-- ===== LEFT: Laptop apps ===== -->
  <g transform="translate(40, 90)">
    <text x="200" y="0" text-anchor="middle" fill="#7fc7f5" font-size="13" font-weight="600" letter-spacing="0.5">YOUR LAPTOP — APPS</text>

    <rect x="0" y="20" width="400" height="320" rx="10" fill="#0d2240" stroke="#5a8fcc" stroke-width="1.5"/>

    <!-- Timeline showing apps appearing/disappearing -->
    <line x1="30" y1="60" x2="370" y2="60" stroke="#7a7872" stroke-width="1"/>
    <text x="30" y="50" fill="#7a7872" font-size="10">9am</text>
    <text x="200" y="50" fill="#7a7872" font-size="10">2pm</text>
    <text x="365" y="50" fill="#7a7872" font-size="10">11pm</text>

    <!-- Chrome appears 9am-12pm, then again 7pm -->
    <rect x="30" y="80" width="100" height="22" rx="3" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="1"/>
    <text x="80" y="96" text-anchor="middle" fill="#dbe9f7" font-size="11">🌐 Chrome</text>
    <rect x="240" y="80" width="60" height="22" rx="3" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="1"/>
    <text x="270" y="96" text-anchor="middle" fill="#dbe9f7" font-size="11">🌐 Chrome</text>

    <!-- Spotify on most of the day -->
    <rect x="30" y="115" width="280" height="22" rx="3" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1"/>
    <text x="170" y="131" text-anchor="middle" fill="#c4f0d4" font-size="11">🎵 Spotify</text>

    <!-- VSCode -->
    <rect x="80" y="150" width="180" height="22" rx="3" fill="#2d1b69" stroke="#a89df5" stroke-width="1"/>
    <text x="170" y="166" text-anchor="middle" fill="#dcd5f5" font-size="11">💻 VS Code</text>

    <!-- Slack -->
    <rect x="60" y="185" width="200" height="22" rx="3" fill="#5c3d1a" stroke="#e9b76a" stroke-width="1"/>
    <text x="160" y="201" text-anchor="middle" fill="#f5e0c2" font-size="11">💬 Slack</text>

    <!-- Discord (evening) -->
    <rect x="280" y="220" width="80" height="22" rx="3" fill="#2d1b69" stroke="#a89df5" stroke-width="1"/>
    <text x="320" y="236" text-anchor="middle" fill="#dcd5f5" font-size="11">🎮 Discord</text>

    <!-- Empty state at night -->
    <text x="200" y="278" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">11pm — laptop closed</text>
    <text x="200" y="296" text-anchor="middle" fill="#7a7872" font-size="10" font-style="italic">all apps gone. nothing running.</text>

    <text x="200" y="320" text-anchor="middle" fill="#a5c3e0" font-size="12" font-style="italic">YOU launch them. YOU quit them.</text>
  </g>

  <!-- ===== RIGHT: Server services ===== -->
  <g transform="translate(480, 90)">
    <text x="200" y="0" text-anchor="middle" fill="#7fcfa0" font-size="13" font-weight="600" letter-spacing="0.5">A SERVER — SERVICES</text>

    <rect x="0" y="20" width="400" height="320" rx="10" fill="#0d2e1a" stroke="#4ba377" stroke-width="1.5"/>

    <!-- Boot moment -->
    <text x="40" y="55" fill="#fde68a" font-size="11" font-weight="500">BOOTED 247 DAYS AGO →</text>

    <!-- nginx: solid bar across the whole timeline -->
    <rect x="30" y="75" width="350" height="26" rx="3" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <text x="40" y="92" fill="#c4f0d4" font-size="12" font-family="ui-monospace, monospace" font-weight="500">nginx</text>
    <text x="100" y="92" fill="#9a9888" font-size="10" font-style="italic">web server</text>
    <text x="295" y="92" fill="#5dca8a" font-size="10">● running</text>

    <!-- postgres -->
    <rect x="30" y="110" width="350" height="26" rx="3" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <text x="40" y="127" fill="#c4f0d4" font-size="12" font-family="ui-monospace, monospace" font-weight="500">postgres</text>
    <text x="115" y="127" fill="#9a9888" font-size="10" font-style="italic">database</text>
    <text x="295" y="127" fill="#5dca8a" font-size="10">● running</text>

    <!-- sshd -->
    <rect x="30" y="145" width="350" height="26" rx="3" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <text x="40" y="162" fill="#c4f0d4" font-size="12" font-family="ui-monospace, monospace" font-weight="500">sshd</text>
    <text x="90" y="162" fill="#9a9888" font-size="10" font-style="italic">remote login</text>
    <text x="295" y="162" fill="#5dca8a" font-size="10">● running</text>

    <!-- redis -->
    <rect x="30" y="180" width="350" height="26" rx="3" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <text x="40" y="197" fill="#c4f0d4" font-size="12" font-family="ui-monospace, monospace" font-weight="500">redis</text>
    <text x="95" y="197" fill="#9a9888" font-size="10" font-style="italic">cache</text>
    <text x="295" y="197" fill="#5dca8a" font-size="10">● running</text>

    <!-- cron -->
    <rect x="30" y="215" width="350" height="26" rx="3" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <text x="40" y="232" fill="#c4f0d4" font-size="12" font-family="ui-monospace, monospace" font-weight="500">cron</text>
    <text x="90" y="232" fill="#9a9888" font-size="10" font-style="italic">scheduled tasks</text>
    <text x="295" y="232" fill="#5dca8a" font-size="10">● running</text>

    <!-- Forever arrow -->
    <text x="200" y="275" text-anchor="middle" fill="#fde68a" font-size="14" font-weight="500">↓ forever ↓</text>
    <text x="200" y="295" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">no human launched them.</text>
    <text x="200" y="312" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">started at boot. won't stop until shutdown.</text>

    <text x="200" y="335" text-anchor="middle" fill="#a5d8c5" font-size="12" font-style="italic">THEY just run. Always.</text>
  </g>

  <!-- Bottom takeaway -->
  <rect x="40" y="445" width="840" height="60" rx="10" fill="#2a2520" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="60" y="468" fill="#fde68a" font-size="13" font-weight="600" letter-spacing="0.5">THE MODEL IS DIFFERENT</text>
  <text x="60" y="490" fill="#c2c0b6" font-size="13" font-style="italic">
    Laptop programs run because <tspan fill="#fde68a">you launched them.</tspan> Server programs run because <tspan fill="#fde68a">they were configured to run forever.</tspan>
  </text>
</svg>
