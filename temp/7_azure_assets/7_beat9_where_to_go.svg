<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect x="0" y="0" width="920" height="480" fill="#1a1a1d"/>

  <text x="460" y="42" text-anchor="middle" fill="#fde68a" font-size="20" font-weight="500">If this interested you — here's where to go next</text>
  <text x="460" y="68" text-anchor="middle" fill="#9a9888" font-size="13" font-style="italic">none of this is hidden behind paywalls or job titles</text>

  <!-- 2x2 grid of next steps -->

  <!-- Top-left: Azure for Students -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="380" height="155" rx="12" fill="#0d2240" stroke="#7fc7f5" stroke-width="1.5"/>
    <text x="20" y="32" fill="#fde68a" font-size="14" font-weight="700">🎓 Azure for Students</text>
    <text x="20" y="60" fill="#dbe9f7" font-size="12">Free credit, no credit card required.</text>
    <text x="20" y="80" fill="#dbe9f7" font-size="12">Sign up with your school email.</text>
    <text x="20" y="100" fill="#dbe9f7" font-size="12">Deploy real VMs, real services.</text>
    <text x="20" y="125" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">azure.microsoft.com/free/students</text>
    <text x="20" y="143" fill="#9a9888" font-size="10" font-style="italic">try what I just demoed, yourself</text>
  </g>

  <!-- Top-right: Microsoft Learn -->
  <g transform="translate(480, 100)">
    <rect x="0" y="0" width="380" height="155" rx="12" fill="#0d2240" stroke="#7fc7f5" stroke-width="1.5"/>
    <text x="20" y="32" fill="#fde68a" font-size="14" font-weight="700">📚 Microsoft Learn</text>
    <text x="20" y="60" fill="#dbe9f7" font-size="12">Free, interactive, browser-based labs.</text>
    <text x="20" y="80" fill="#dbe9f7" font-size="12">Walk through scenarios step-by-step.</text>
    <text x="20" y="100" fill="#dbe9f7" font-size="12">No installation needed.</text>
    <text x="20" y="125" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">learn.microsoft.com</text>
    <text x="20" y="143" fill="#9a9888" font-size="10" font-style="italic">start with "Azure Fundamentals"</text>
  </g>

  <!-- Bottom-left: AZ-900 -->
  <g transform="translate(60, 275)">
    <rect x="0" y="0" width="380" height="155" rx="12" fill="#0d2240" stroke="#7fc7f5" stroke-width="1.5"/>
    <text x="20" y="32" fill="#fde68a" font-size="14" font-weight="700">🏆 AZ-900 Certification</text>
    <text x="20" y="60" fill="#dbe9f7" font-size="12">Entry-level Azure certification.</text>
    <text x="20" y="80" fill="#dbe9f7" font-size="12">Free study materials on Microsoft Learn.</text>
    <text x="20" y="100" fill="#dbe9f7" font-size="12">First-job-ready credential.</text>
    <text x="20" y="125" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace">aka.ms/az900</text>
    <text x="20" y="143" fill="#9a9888" font-size="10" font-style="italic">if you want a certificate to show</text>
  </g>

  <!-- Bottom-right: Your laptop -->
  <g transform="translate(480, 275)">
    <rect x="0" y="0" width="380" height="155" rx="12" fill="#2d1b69" stroke="#a89df5" stroke-width="1.5"/>
    <text x="20" y="32" fill="#fde68a" font-size="14" font-weight="700">💻 Your laptop — tonight</text>
    <text x="20" y="60" fill="#cec5f5" font-size="12">Enable Hyper-V (we covered this).</text>
    <text x="20" y="80" fill="#cec5f5" font-size="12">Install Ubuntu in a VM. Try the CLI.</text>
    <text x="20" y="100" fill="#cec5f5" font-size="12">Install Windows Server. See AD.</text>
    <text x="20" y="125" fill="#fde68a" font-size="11">No internet needed. No money.</text>
    <text x="20" y="143" fill="#9a9888" font-size="10" font-style="italic">the lowest-barrier place to start</text>
  </g>

</svg>
