<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 8 5, 0 10" fill="#9a9888"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="580" fill="#1a1a1d"/>

  <text x="400" y="40" text-anchor="middle" fill="#f3f1ea" font-size="22" font-weight="500">Way more than 8 things want to run</text>

  <!-- Programs column -->
  <rect x="40" y="80" width="200" height="50" rx="10" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="1"/>
  <text x="140" y="110" text-anchor="middle" fill="#dbe9f7" font-size="15">YouTube — 12 tabs</text>

  <rect x="40" y="145" width="200" height="50" rx="10" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1"/>
  <text x="140" y="175" text-anchor="middle" fill="#d4f0dd" font-size="15">Discord</text>

  <rect x="40" y="210" width="200" height="50" rx="10" fill="#5c3d1a" stroke="#e9b76a" stroke-width="1"/>
  <text x="140" y="240" text-anchor="middle" fill="#f5e0c2" font-size="15">Game download</text>

  <rect x="40" y="275" width="200" height="50" rx="10" fill="#2d1b69" stroke="#a89df5" stroke-width="1"/>
  <text x="140" y="305" text-anchor="middle" fill="#dcd5f5" font-size="15">Spotify</text>

  <rect x="40" y="340" width="200" height="50" rx="10" fill="#5c1a1a" stroke="#e88080" stroke-width="1"/>
  <text x="140" y="370" text-anchor="middle" fill="#f5cfcf" font-size="15">VS Code</text>

  <rect x="40" y="405" width="200" height="50" rx="10" fill="#1a4d4d" stroke="#7fd4d4" stroke-width="1"/>
  <text x="140" y="435" text-anchor="middle" fill="#cef0f0" font-size="15">Antivirus scanning</text>

  <text x="140" y="488" text-anchor="middle" fill="#7a7872" font-size="14" font-style="italic">… and ~200 more</text>

  <!-- Arrows -->
  <line x1="245" y1="105" x2="465" y2="265" stroke="#9a9888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="245" y1="170" x2="465" y2="280" stroke="#9a9888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="245" y1="235" x2="465" y2="295" stroke="#9a9888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="245" y1="300" x2="465" y2="310" stroke="#9a9888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="245" y1="365" x2="465" y2="320" stroke="#9a9888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="245" y1="430" x2="465" y2="330" stroke="#9a9888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CPU box -->
  <rect x="475" y="220" width="280" height="160" rx="14" fill="#3c2f0a" stroke="#f59e0b" stroke-width="2"/>
  <text x="615" y="265" text-anchor="middle" fill="#fde68a" font-size="26" font-weight="600">Your CPU</text>
  <text x="615" y="298" text-anchor="middle" fill="#f3e6c0" font-size="17">8 cores total</text>
  <line x1="510" y1="320" x2="720" y2="320" stroke="#7a5a1a" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="615" y="350" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="500" font-style="italic">Who decides who gets a slice?</text>

</svg>
