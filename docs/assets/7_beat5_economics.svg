<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect x="0" y="0" width="920" height="540" fill="#1a1a1d"/>

  <text x="460" y="32" text-anchor="middle" fill="#fde68a" font-size="18" font-weight="500">The economic model</text>
  <text x="460" y="54" text-anchor="middle" fill="#9a9888" font-size="13" font-style="italic">why the cloud isn't just technically different — it's economically different</text>

  <!-- ===== LEFT: Buy a server ===== -->
  <g transform="translate(40, 90)">
    <text x="200" y="0" text-anchor="middle" fill="#7fc7f5" font-size="13" font-weight="600" letter-spacing="0.5">BUY A SERVER (THE OLD WAY)</text>

    <rect x="0" y="20" width="400" height="270" rx="10" fill="#0d2240" stroke="#5a8fcc" stroke-width="1.5"/>

    <text x="20" y="48" fill="#9a9888" font-size="11" letter-spacing="0.5">UPFRONT COST</text>
    <text x="20" y="74" fill="#fda4a4" font-size="20" font-weight="600">$10,000+</text>
    <text x="20" y="92" fill="#9a9888" font-size="11" font-style="italic">paid before you write a single line of code</text>

    <text x="20" y="124" fill="#9a9888" font-size="11" letter-spacing="0.5">PAYS FOR</text>
    <text x="20" y="146" fill="#dbe9f7" font-size="12">• The hardware itself</text>
    <text x="20" y="164" fill="#dbe9f7" font-size="12">• Rack space, cooling, power for years</text>
    <text x="20" y="182" fill="#dbe9f7" font-size="12">• Setup, networking, OS install</text>
    <text x="20" y="200" fill="#dbe9f7" font-size="12">• Maintenance, patching, backups</text>

    <text x="20" y="232" fill="#9a9888" font-size="11" letter-spacing="0.5">RISK</text>
    <text x="20" y="254" fill="#fda4a4" font-size="12">Pay even if idle. Pay even if app fails.</text>
    <text x="20" y="272" fill="#fda4a4" font-size="12">Outgrow it? Buy another. Need less? Stuck.</text>
  </g>

  <!-- ===== RIGHT: Rent in cloud ===== -->
  <g transform="translate(480, 90)">
    <text x="200" y="0" text-anchor="middle" fill="#a89df5" font-size="13" font-weight="600" letter-spacing="0.5">RENT IN AZURE (THE NEW WAY)</text>

    <rect x="0" y="20" width="400" height="270" rx="10" fill="#2d1b69" stroke="#a89df5" stroke-width="1.5"/>

    <text x="20" y="48" fill="#9a9888" font-size="11" letter-spacing="0.5">UPFRONT COST</text>
    <text x="20" y="74" fill="#7fcfa0" font-size="20" font-weight="600">$0</text>
    <text x="20" y="92" fill="#9a9888" font-size="11" font-style="italic">credit card required, but you don't pay until you run something</text>

    <text x="20" y="124" fill="#9a9888" font-size="11" letter-spacing="0.5">PAY-AS-YOU-GO</text>
    <text x="20" y="146" fill="#cec5f5" font-size="12">• Charged by the <tspan fill="#fde68a" font-weight="500">second</tspan> a VM runs</text>
    <text x="20" y="164" fill="#cec5f5" font-size="12">• A small VM: <tspan fill="#fde68a" font-family="ui-monospace, monospace">~$0.01 / hour</tspan></text>
    <text x="20" y="182" fill="#cec5f5" font-size="12">• A big VM: <tspan fill="#fde68a" font-family="ui-monospace, monospace">~$5 / hour</tspan></text>
    <text x="20" y="200" fill="#cec5f5" font-size="12">• Stop it = stop paying</text>

    <text x="20" y="232" fill="#9a9888" font-size="11" letter-spacing="0.5">FLEXIBILITY</text>
    <text x="20" y="254" fill="#7fcfa0" font-size="12">Need more? Resize in seconds.</text>
    <text x="20" y="272" fill="#7fcfa0" font-size="12">Need less? Delete it. Pay nothing.</text>
  </g>

  <!-- Bottom takeaway -->
  <rect x="40" y="400" width="840" height="120" rx="10" fill="#2a2520" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="60" y="426" fill="#fde68a" font-size="13" font-weight="600" letter-spacing="0.5">THE BARRIER DROPPED</text>

  <text x="60" y="454" fill="#f3f1ea" font-size="13">
    To run a server in 2005 — you needed money, time, and a place to put it. Big company territory.
  </text>
  <text x="60" y="478" fill="#f3f1ea" font-size="13">
    To run a server in 2026 — <tspan fill="#fde68a">a credit card. Anyone.</tspan> A student, a startup, a one-person side project.
  </text>
  <text x="60" y="504" fill="#c2c0b6" font-size="12" font-style="italic">
    That's the cloud's biggest impact — not the technology. The technology was the prerequisite. <tspan fill="#fde68a">The economics are what changed the world.</tspan>
  </text>
</svg>
