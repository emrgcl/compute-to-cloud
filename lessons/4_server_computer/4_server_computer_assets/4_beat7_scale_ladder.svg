<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <defs>
    <marker id="arrLad" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 8 5, 0 10" fill="#9a9888"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="500" fill="#1a1a1d"/>

  <!-- Title -->
  <text x="440" y="35" text-anchor="middle" fill="#fde68a" font-size="18" font-weight="500">Not magic — a lot of servers.</text>
  <text x="440" y="58" text-anchor="middle" fill="#9a9888" font-size="13" font-style="italic">zooming out from one machine to all of Azure</text>

  <!-- Y position for the 5 boxes -->
  <!-- box 1: ONE -->
  <g transform="translate(40, 130)">
    <rect x="0" y="0" width="140" height="160" rx="10" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="1.5"/>
    <text x="70" y="28" text-anchor="middle" fill="#7fcfa0" font-size="11" font-weight="600" letter-spacing="1">ONE</text>

    <!-- single server icon -->
    <rect x="40" y="60" width="60" height="14" rx="2" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1"/>
    <circle cx="48" cy="67" r="1.5" fill="#5dca8a"/>
    <circle cx="55" cy="67" r="1.5" fill="#5dca8a"/>

    <text x="70" y="115" text-anchor="middle" fill="#c4f0d4" font-size="13" font-weight="500">1 server</text>
    <text x="70" y="135" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">pizza box</text>
  </g>

  <!-- arrow 1 -->
  <line x1="185" y1="210" x2="205" y2="210" stroke="#9a9888" stroke-width="1.5" marker-end="url(#arrLad)"/>

  <!-- box 2: RACK -->
  <g transform="translate(210, 130)">
    <rect x="0" y="0" width="140" height="160" rx="10" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="1.5"/>
    <text x="70" y="28" text-anchor="middle" fill="#7fcfa0" font-size="11" font-weight="600" letter-spacing="1">RACK</text>

    <!-- stack of servers -->
    <g transform="translate(50, 50)">
      <rect x="0" y="0" width="40" height="6" rx="1" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="0.5"/>
      <rect x="0" y="8" width="40" height="6" rx="1" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="0.5"/>
      <rect x="0" y="16" width="40" height="6" rx="1" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="0.5"/>
      <rect x="0" y="24" width="40" height="6" rx="1" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="0.5"/>
      <rect x="0" y="32" width="40" height="6" rx="1" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="0.5"/>
      <rect x="0" y="40" width="40" height="6" rx="1" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="0.5"/>
    </g>

    <text x="70" y="115" text-anchor="middle" fill="#c4f0d4" font-size="13" font-weight="500">~20-50 servers</text>
    <text x="70" y="135" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">in one cabinet</text>
  </g>

  <!-- arrow 2 -->
  <line x1="355" y1="210" x2="375" y2="210" stroke="#9a9888" stroke-width="1.5" marker-end="url(#arrLad)"/>

  <!-- box 3: ROW -->
  <g transform="translate(380, 130)">
    <rect x="0" y="0" width="140" height="160" rx="10" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <text x="70" y="28" text-anchor="middle" fill="#7fcfa0" font-size="11" font-weight="600" letter-spacing="1">ROW</text>

    <!-- multiple racks side by side -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="14" height="46" rx="1" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="0.5"/>
      <rect x="18" y="0" width="14" height="46" rx="1" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="0.5"/>
      <rect x="36" y="0" width="14" height="46" rx="1" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="0.5"/>
      <rect x="54" y="0" width="14" height="46" rx="1" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="0.5"/>
      <rect x="72" y="0" width="14" height="46" rx="1" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="0.5"/>
      <rect x="90" y="0" width="14" height="46" rx="1" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="0.5"/>
    </g>

    <text x="70" y="115" text-anchor="middle" fill="#c4f0d4" font-size="13" font-weight="500">hundreds of racks</text>
    <text x="70" y="135" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">in a row</text>
  </g>

  <!-- arrow 3 -->
  <line x1="525" y1="210" x2="545" y2="210" stroke="#9a9888" stroke-width="1.5" marker-end="url(#arrLad)"/>

  <!-- box 4: DATACENTER -->
  <g transform="translate(550, 130)">
    <rect x="0" y="0" width="140" height="160" rx="10" fill="#2d1b69" stroke="#a89df5" stroke-width="1.5"/>
    <text x="70" y="28" text-anchor="middle" fill="#a89df5" font-size="11" font-weight="600" letter-spacing="1">DATACENTER</text>

    <!-- building silhouette -->
    <g transform="translate(30, 50)">
      <rect x="0" y="20" width="80" height="40" rx="1" fill="#1a103e" stroke="#a89df5" stroke-width="1"/>
      <polygon points="-4,20 40,0 84,20" fill="#1a103e" stroke="#a89df5" stroke-width="1"/>
      <rect x="10" y="30" width="8" height="10" fill="#a89df5" opacity="0.4"/>
      <rect x="24" y="30" width="8" height="10" fill="#a89df5" opacity="0.4"/>
      <rect x="38" y="30" width="8" height="10" fill="#a89df5" opacity="0.4"/>
      <rect x="52" y="30" width="8" height="10" fill="#a89df5" opacity="0.4"/>
      <rect x="66" y="30" width="8" height="10" fill="#a89df5" opacity="0.4"/>
      <rect x="10" y="46" width="8" height="10" fill="#a89df5" opacity="0.4"/>
      <rect x="24" y="46" width="8" height="10" fill="#a89df5" opacity="0.4"/>
      <rect x="38" y="46" width="8" height="10" fill="#a89df5" opacity="0.4"/>
      <rect x="52" y="46" width="8" height="10" fill="#a89df5" opacity="0.4"/>
      <rect x="66" y="46" width="8" height="10" fill="#a89df5" opacity="0.4"/>
    </g>

    <text x="70" y="125" text-anchor="middle" fill="#dcd5f5" font-size="13" font-weight="500">tens of thousands</text>
    <text x="70" y="142" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">in one building</text>
  </g>

  <!-- arrow 4 -->
  <line x1="695" y1="210" x2="715" y2="210" stroke="#9a9888" stroke-width="1.5" marker-end="url(#arrLad)"/>

  <!-- box 5: AZURE -->
  <g transform="translate(720, 130)">
    <rect x="0" y="0" width="140" height="160" rx="10" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2"/>
    <text x="70" y="28" text-anchor="middle" fill="#7fc7f5" font-size="11" font-weight="600" letter-spacing="1">AZURE</text>

    <!-- globe / map symbol -->
    <circle cx="70" cy="80" r="28" fill="none" stroke="#7fc7f5" stroke-width="1.5"/>
    <ellipse cx="70" cy="80" rx="28" ry="12" fill="none" stroke="#7fc7f5" stroke-width="0.5"/>
    <ellipse cx="70" cy="80" rx="14" ry="28" fill="none" stroke="#7fc7f5" stroke-width="0.5"/>
    <line x1="42" y1="80" x2="98" y2="80" stroke="#7fc7f5" stroke-width="0.5"/>

    <text x="70" y="130" text-anchor="middle" fill="#dbe9f7" font-size="13" font-weight="600">~400 worldwide</text>
    <text x="70" y="147" text-anchor="middle" fill="#9a9888" font-size="11" font-style="italic">70+ countries</text>
  </g>

  <!-- ===== Bottom takeaway ===== -->
  <rect x="40" y="335" width="820" height="135" rx="10" fill="#2a2520" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="60" y="362" fill="#fde68a" font-size="13" font-weight="600" letter-spacing="0.5">THAT'S AZURE</text>

  <text x="60" y="390" fill="#f3f1ea" font-size="14">
    Take everything from Layer 1, 2, 3, 4 — and multiply by a few million. Spread across the world.
  </text>
  <text x="60" y="412" fill="#c2c0b6" font-size="13" font-style="italic">
    Same five things you learned in Layer 1. Just <tspan fill="#fde68a" font-weight="500">a lot more of them, in a lot more places, owned by someone else.</tspan>
  </text>
  <text x="60" y="448" fill="#fde68a" font-size="14" font-weight="500" font-style="italic">
    Not magic — a lot of servers.
  </text>
</svg>
