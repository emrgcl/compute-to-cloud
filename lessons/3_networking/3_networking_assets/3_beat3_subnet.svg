<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="880" height="500" fill="#1a1a1d"/>

  <text x="440" y="35" text-anchor="middle" fill="#9a9888" font-size="14" letter-spacing="1">COMPUTERS GROUP INTO NEIGHBORHOODS — SUBNETS</text>

  <!-- Subnet boundary - wrap around the 3 left buildings -->
  <rect x="60" y="80" width="500" height="340" rx="20" fill="none" stroke="#7fcfa0" stroke-width="2" stroke-dasharray="8 5" opacity="0.8"/>
  <text x="80" y="105" fill="#7fcfa0" font-size="13" font-weight="500" letter-spacing="0.5">SUBNET — your home network</text>
  <text x="80" y="123" fill="#5a9c75" font-size="11" font-family="ui-monospace, monospace">192.168.1.0/24</text>

  <!-- Building 1 - laptop -->
  <rect x="100" y="180" width="120" height="160" rx="6" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2"/>
  <polygon points="95,180 160,135 225,180" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2"/>
  <rect x="115" y="215" width="22" height="30" fill="#0d2240" stroke="#5a8fcc" stroke-width="1"/>
  <rect x="145" y="215" width="22" height="30" fill="#0d2240" stroke="#5a8fcc" stroke-width="1"/>
  <rect x="175" y="215" width="22" height="30" fill="#0d2240" stroke="#5a8fcc" stroke-width="1"/>
  <rect x="115" y="260" width="40" height="60" fill="#0d2240" stroke="#5a8fcc" stroke-width="1"/>
  <rect x="170" y="260" width="40" height="60" fill="#0d2240" stroke="#5a8fcc" stroke-width="1"/>
  <text x="160" y="362" text-anchor="middle" fill="#dbe9f7" font-size="11">Your laptop</text>
  <text x="160" y="380" text-anchor="middle" fill="#fde68a" font-size="12" font-family="ui-monospace, monospace" font-weight="500">192.168.1.5</text>

  <!-- Building 2 - phone -->
  <rect x="260" y="180" width="120" height="160" rx="6" fill="#2d1b69" stroke="#a89df5" stroke-width="2"/>
  <polygon points="255,180 320,135 385,180" fill="#2d1b69" stroke="#a89df5" stroke-width="2"/>
  <rect x="275" y="215" width="22" height="30" fill="#1a103e" stroke="#7c70d4" stroke-width="1"/>
  <rect x="305" y="215" width="22" height="30" fill="#1a103e" stroke="#7c70d4" stroke-width="1"/>
  <rect x="335" y="215" width="22" height="30" fill="#1a103e" stroke="#7c70d4" stroke-width="1"/>
  <rect x="275" y="260" width="40" height="60" fill="#1a103e" stroke="#7c70d4" stroke-width="1"/>
  <rect x="330" y="260" width="40" height="60" fill="#1a103e" stroke="#7c70d4" stroke-width="1"/>
  <text x="320" y="362" text-anchor="middle" fill="#dcd5f5" font-size="11">Your phone</text>
  <text x="320" y="380" text-anchor="middle" fill="#fde68a" font-size="12" font-family="ui-monospace, monospace" font-weight="500">192.168.1.8</text>

  <!-- Building 3 - smart TV -->
  <rect x="420" y="180" width="120" height="160" rx="6" fill="#5c3d1a" stroke="#e9b76a" stroke-width="2"/>
  <polygon points="415,180 480,135 545,180" fill="#5c3d1a" stroke="#e9b76a" stroke-width="2"/>
  <rect x="435" y="215" width="22" height="30" fill="#332108" stroke="#a8821e" stroke-width="1"/>
  <rect x="465" y="215" width="22" height="30" fill="#332108" stroke="#a8821e" stroke-width="1"/>
  <rect x="495" y="215" width="22" height="30" fill="#332108" stroke="#a8821e" stroke-width="1"/>
  <rect x="435" y="260" width="40" height="60" fill="#332108" stroke="#a8821e" stroke-width="1"/>
  <rect x="490" y="260" width="40" height="60" fill="#332108" stroke="#a8821e" stroke-width="1"/>
  <text x="480" y="362" text-anchor="middle" fill="#f5e0c2" font-size="11">Smart TV</text>
  <text x="480" y="380" text-anchor="middle" fill="#fde68a" font-size="12" font-family="ui-monospace, monospace" font-weight="500">192.168.1.12</text>

  <!-- Direct connection arrows between all 3 (showing they can talk directly) -->
  <path d="M 220 250 Q 240 250 260 250" stroke="#7fcfa0" stroke-width="2" fill="none"/>
  <path d="M 380 250 Q 400 250 420 250" stroke="#7fcfa0" stroke-width="2" fill="none"/>
  <text x="240" y="170" text-anchor="middle" fill="#7fcfa0" font-size="11" font-style="italic">talk directly</text>
  <text x="400" y="170" text-anchor="middle" fill="#7fcfa0" font-size="11" font-style="italic">talk directly</text>

  <!-- "Outside" building for contrast - Azure VM far away -->
  <rect x="660" y="240" width="120" height="100" rx="6" fill="#0d2e1a" stroke="#4ba377" stroke-width="1.5" opacity="0.7"/>
  <text x="720" y="285" text-anchor="middle" fill="#7fcfa0" font-size="11" opacity="0.9">Azure VM</text>
  <text x="720" y="305" text-anchor="middle" fill="#fde68a" font-size="11" font-family="ui-monospace, monospace" opacity="0.9">52.114.128.10</text>
  <text x="720" y="325" text-anchor="middle" fill="#9a9888" font-size="10" font-style="italic" opacity="0.9">different subnet</text>

  <!-- Question between subnet and outside -->
  <text x="600" y="285" text-anchor="middle" fill="#fde68a" font-size="20" font-weight="500">?</text>

  <!-- Caption -->
  <text x="320" y="455" text-anchor="middle" fill="#f3f1ea" font-size="14">Same neighborhood, addresses share a prefix (<tspan font-family="ui-monospace, monospace" fill="#fde68a">192.168.1.*</tspan>) — they reach each other directly.</text>
</svg>
