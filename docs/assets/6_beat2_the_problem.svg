<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect x="0" y="0" width="920" height="500" fill="#1a1a1d"/>

  <text x="460" y="32" text-anchor="middle" fill="#fde68a" font-size="18" font-weight="500">The problem</text>
  <text x="460" y="54" text-anchor="middle" fill="#9a9888" font-size="13" font-style="italic">servers are huge. apps are small.</text>

  <!-- ===== LEFT: One server, one tiny app ===== -->
  <g transform="translate(60, 90)">
    <text x="180" y="0" text-anchor="middle" fill="#7fcfa0" font-size="13" font-weight="600" letter-spacing="0.5">ONE PHYSICAL SERVER</text>

    <!-- The server box (representing 96 cores / 1 TB RAM) -->
    <rect x="0" y="20" width="360" height="320" rx="10" fill="#0d2e1a" stroke="#7fcfa0" stroke-width="2"/>

    <!-- Capacity grid - 96 small squares (12 x 8) representing CPU cores -->
    <g transform="translate(20, 45)">
      <!-- 12 wide, 8 tall = 96 squares -->
      <g>
        <!-- Row 1-8: all cores -->
