<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect x="0" y="0" width="880" height="460" fill="#1a1a1d"/>

  <!-- ===== LAPTOP SILHOUETTE (left) ===== -->
  <g transform="translate(140, 130)">
    <!-- Screen -->
    <path d="M 30 0 L 170 0 L 180 100 L 20 100 Z" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2"/>
    <rect x="40" y="10" width="120" height="80" rx="3" fill="#0d2240" stroke="#5a8fcc" stroke-width="0.5"/>
    <!-- Base -->
    <path d="M 0 100 L 200 100 L 210 110 L -10 110 Z" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="2"/>
  </g>
  <text x="240" y="280" text-anchor="middle" fill="#dbe9f7" font-size="16" font-weight="500">Your laptop</text>
  <text x="240" y="302" text-anchor="middle" fill="#7a7872" font-size="13" font-style="italic">what you use</text>

  <!-- ===== RACK SERVER SILHOUETTE (right) ===== -->
  <g transform="translate(540, 100)">
    <!-- Stack of horizontal rack units -->
    <rect x="0" y="0" width="200" height="22" rx="2" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <circle cx="10" cy="11" r="2" fill="#5dca8a"/>
    <circle cx="20" cy="11" r="2" fill="#5dca8a"/>
    <rect x="40" y="6" width="100" height="10" rx="1" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>

    <rect x="0" y="26" width="200" height="22" rx="2" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <circle cx="10" cy="37" r="2" fill="#5dca8a"/>
    <circle cx="20" cy="37" r="2" fill="#5dca8a"/>
    <rect x="40" y="32" width="100" height="10" rx="1" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>

    <rect x="0" y="52" width="200" height="22" rx="2" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <circle cx="10" cy="63" r="2" fill="#5dca8a"/>
    <circle cx="20" cy="63" r="2" fill="#5dca8a"/>
    <rect x="40" y="58" width="100" height="10" rx="1" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>

    <!-- highlighted unit (the one we're talking about) -->
    <rect x="-3" y="76" width="206" height="28" rx="2" fill="#1a4d2e" stroke="#fde68a" stroke-width="2"/>
    <circle cx="10" cy="90" r="2.5" fill="#fde68a"/>
    <circle cx="20" cy="90" r="2.5" fill="#fde68a"/>
    <rect x="40" y="84" width="100" height="12" rx="1" fill="#0d2e1a" stroke="#a8821e" stroke-width="0.5"/>

    <rect x="0" y="108" width="200" height="22" rx="2" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <circle cx="10" cy="119" r="2" fill="#5dca8a"/>
    <circle cx="20" cy="119" r="2" fill="#5dca8a"/>
    <rect x="40" y="114" width="100" height="10" rx="1" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>

    <rect x="0" y="134" width="200" height="22" rx="2" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <circle cx="10" cy="145" r="2" fill="#5dca8a"/>
    <circle cx="20" cy="145" r="2" fill="#5dca8a"/>
    <rect x="40" y="140" width="100" height="10" rx="1" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>

    <rect x="0" y="160" width="200" height="22" rx="2" fill="#1a4d2e" stroke="#7fcfa0" stroke-width="1.5"/>
    <circle cx="10" cy="171" r="2" fill="#5dca8a"/>
    <circle cx="20" cy="171" r="2" fill="#5dca8a"/>
    <rect x="40" y="166" width="100" height="10" rx="1" fill="#0d2e1a" stroke="#4ba377" stroke-width="0.5"/>
  </g>
  <text x="640" y="320" text-anchor="middle" fill="#c4f0d4" font-size="16" font-weight="500">A rack of servers</text>
  <text x="640" y="342" text-anchor="middle" fill="#7a7872" font-size="13" font-style="italic">what serves you</text>

  <!-- ===== Question mark between ===== -->
  <text x="440" y="245" text-anchor="middle" fill="#fde68a" font-size="72" font-weight="300" opacity="0.6">?</text>

  <!-- ===== Bottom framing question ===== -->
  <text x="440" y="410" text-anchor="middle" fill="#fde68a" font-size="20" font-weight="500" font-style="italic">It's not designed for you.</text>
  <text x="440" y="440" text-anchor="middle" fill="#fde68a" font-size="20" font-weight="500" font-style="italic">It's designed for the network.</text>
</svg>
