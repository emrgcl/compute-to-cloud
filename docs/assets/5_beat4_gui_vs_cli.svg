<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect x="0" y="0" width="920" height="520" fill="#1a1a1d"/>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" fill="#fde68a" font-size="18" font-weight="500">Same job. Different face.</text>
  <text x="460" y="54" text-anchor="middle" fill="#9a9888" font-size="13" font-style="italic">no screen means no icons — just text</text>

  <!-- ===== LEFT: Desktop GUI (familiar) ===== -->
  <g transform="translate(40, 90)">
    <text x="200" y="0" text-anchor="middle" fill="#7fc7f5" font-size="13" font-weight="600" letter-spacing="0.5">WHAT YOU SEE ON YOUR LAPTOP</text>

    <!-- Window chrome -->
    <rect x="0" y="20" width="400" height="280" rx="8" fill="#2a3a4f" stroke="#5a8fcc" stroke-width="1.5"/>
    <rect x="0" y="20" width="400" height="28" rx="8" fill="#1e3a5f"/>
    <circle cx="20" cy="34" r="6" fill="#ef4444"/>
    <circle cx="40" cy="34" r="6" fill="#fde68a"/>
    <circle cx="60" cy="34" r="6" fill="#5dca8a"/>
    <text x="200" y="40" text-anchor="middle" fill="#9a9888" font-size="11">My Computer</text>

    <!-- Desktop icons -->
    <g transform="translate(40, 70)">
      <rect x="0" y="0" width="44" height="44" rx="4" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="0.5"/>
      <text x="22" y="28" text-anchor="middle" fill="#7fc7f5" font-size="20">📁</text>
      <text x="22" y="65" text-anchor="middle" fill="#dbe9f7" font-size="9">Documents</text>
    </g>
    <g transform="translate(110, 70)">
      <rect x="0" y="0" width="44" height="44" rx="4" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="0.5"/>
      <text x="22" y="28" text-anchor="middle" fill="#7fc7f5" font-size="20">🌐</text>
      <text x="22" y="65" text-anchor="middle" fill="#dbe9f7" font-size="9">Browser</text>
    </g>
    <g transform="translate(180, 70)">
      <rect x="0" y="0" width="44" height="44" rx="4" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="0.5"/>
      <text x="22" y="28" text-anchor="middle" fill="#7fc7f5" font-size="20">🎵</text>
      <text x="22" y="65" text-anchor="middle" fill="#dbe9f7" font-size="9">Music</text>
    </g>
    <g transform="translate(250, 70)">
      <rect x="0" y="0" width="44" height="44" rx="4" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="0.5"/>
      <text x="22" y="28" text-anchor="middle" fill="#7fc7f5" font-size="20">🖼️</text>
      <text x="22" y="65" text-anchor="middle" fill="#dbe9f7" font-size="9">Photos</text>
    </g>
    <g transform="translate(320, 70)">
      <rect x="0" y="0" width="44" height="44" rx="4" fill="#1e3a5f" stroke="#7fc7f5" stroke-width="0.5"/>
      <text x="22" y="28" text-anchor="middle" fill="#7fc7f5" font-size="20">⚙️</text>
      <text x="22" y="65" text-anchor="middle" fill="#dbe9f7" font-size="9">Settings</text>
    </g>

    <!-- Task bar at bottom -->
    <rect x="0" y="265" width="400" height="35" rx="0" fill="#1e3a5f"/>
    <rect x="10" y="272" width="80" height="20" rx="3" fill="#2a3a4f" stroke="#5a8fcc" stroke-width="0.5"/>
    <text x="50" y="285" text-anchor="middle" fill="#dbe9f7" font-size="9">Start</text>
    <rect x="100" y="272" width="60" height="20" rx="3" fill="#2a3a4f" stroke="#5a8fcc" stroke-width="0.5"/>
    <text x="130" y="285" text-anchor="middle" fill="#dbe9f7" font-size="9">Chrome</text>

    <text x="200" y="325" text-anchor="middle" fill="#a5c3e0" font-size="12" font-style="italic">point, click, drag, double-click</text>
  </g>

  <!-- ===== RIGHT: Linux terminal (the reveal) ===== -->
  <g transform="translate(480, 90)">
    <text x="200" y="0" text-anchor="middle" fill="#7fcfa0" font-size="13" font-weight="600" letter-spacing="0.5">WHAT A SERVER ADMIN SEES</text>

    <!-- Terminal window -->
    <rect x="0" y="20" width="400" height="280" rx="8" fill="#0a0a0a" stroke="#4ba377" stroke-width="1.5"/>
    <rect x="0" y="20" width="400" height="22" rx="8" fill="#1a1a1d"/>
    <text x="200" y="36" text-anchor="middle" fill="#7a7872" font-size="10">admin@web-prod-01 ~ $</text>

    <!-- Terminal content - real-looking commands -->
    <g font-family="ui-monospace, monospace" font-size="11">
      <text x="14" y="62" fill="#5dca8a">$ </text>
      <text x="28" y="62" fill="#dbe9f7">uptime</text>
      <text x="14" y="78" fill="#9a9888">  14:32:09 up 247 days, 11:42,  3 users</text>

      <text x="14" y="100" fill="#5dca8a">$ </text>
      <text x="28" y="100" fill="#dbe9f7">systemctl status nginx</text>
      <text x="14" y="116" fill="#7fcfa0">● nginx.service - HTTP server</text>
      <text x="14" y="132" fill="#9a9888">   Active: </text>
      <text x="72" y="132" fill="#7fcfa0">active (running)</text>
      <text x="14" y="148" fill="#9a9888">   Memory: 12.4M  · CPU: 1.2%</text>

      <text x="14" y="170" fill="#5dca8a">$ </text>
      <text x="28" y="170" fill="#dbe9f7">df -h /var/log</text>
      <text x="14" y="186" fill="#9a9888">Filesystem      Size  Used Avail</text>
      <text x="14" y="202" fill="#a5c3e0">/dev/sda2        50G   31G   19G</text>

      <text x="14" y="224" fill="#5dca8a">$ </text>
      <text x="28" y="224" fill="#dbe9f7">tail -f access.log</text>
      <text x="14" y="240" fill="#9a9888">52.114.128.10 - GET /api/users 200</text>
      <text x="14" y="256" fill="#9a9888">142.250.80.46 - GET /favicon.ico 200</text>

      <text x="14" y="278" fill="#5dca8a">$ </text>
      <rect x="28" y="269" width="8" height="13" fill="#5dca8a">
        <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <text x="200" y="325" text-anchor="middle" fill="#a5d8c5" font-size="12" font-style="italic">type, enter, scripted, remote, fast</text>
  </g>

  <!-- Bottom takeaway -->
  <rect x="40" y="450" width="840" height="55" rx="10" fill="#2a2520" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="60" y="473" fill="#fde68a" font-size="13" font-weight="600" letter-spacing="0.5">SAME UNDERLYING JOBS — DIFFERENT INTERFACE</text>
  <text x="60" y="495" fill="#c2c0b6" font-size="13" font-style="italic">
    A huge share of the internet's servers look like this. <tspan fill="#fde68a">The people who run them prefer it this way</tspan> — faster, scriptable, remote-friendly.
  </text>
</svg>
